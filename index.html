const { useState, useEffect, useRef, useMemo } = React;

const CORRECT_PASSWORD = "BayAreaAutoCare2026$";

function PasswordGate({children}) {
  const [input, setInput] = useState("");
  const [unlocked, setUnlocked] = useState(false);
  const [error, setError] = useState(false);
  const [show, setShow] = useState(false);

  if (unlocked) return children;

  function attempt() {
    if (input === CORRECT_PASSWORD) {
      setUnlocked(true);
      setError(false);
    } else {
      setError(true);
      setInput("");
    }
  }

  function onKey(e) {
    if (e.key === "Enter") attempt();
  }

  return (
    <div style={{
      minHeight:"100vh", background:"#000000",
      display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"Inter, sans-serif",
    }}>
      <div style={{
        background:"#111111", border:"1px solid #2A2A2A",
        borderRadius:16, padding:"44px 40px", width:380, maxWidth:"90vw",
        display:"flex", flexDirection:"column", alignItems:"center", gap:0,
      }}>
        {/* Logo mark */}
        <div style={{
          width:56, height:56, borderRadius:14, background:"#FFFFFF",
          display:"flex", alignItems:"center", justifyContent:"center",
          marginBottom:22,
        }}>
          <svg width={28} height={28} viewBox="0 0 24 24" fill="none"
            stroke="#000000" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
            <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h11l5 5v5h-2M7 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM17 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
          </svg>
        </div>

        <div style={{fontSize:22, fontWeight:700, color:"#FFFFFF", marginBottom:6, letterSpacing:"-0.3px"}}>
          Bay Area Auto Care
        </div>
        <div style={{fontSize:13.5, color:"#666666", marginBottom:32}}>
          Business Management Portal
        </div>

        <div style={{width:"100%", marginBottom:12}}>
          <div style={{fontSize:12, fontWeight:600, color:"#888888", marginBottom:8, textTransform:"uppercase", letterSpacing:0.5}}>
            Password
          </div>
          <div style={{position:"relative"}}>
            <input
              type={show ? "text" : "password"}
              value={input}
              onChange={e=>{setInput(e.target.value);setError(false);}}
              onKeyDown={onKey}
              placeholder="Enter password"
              autoFocus
              style={{
                width:"100%", padding:"11px 44px 11px 14px",
                background:"#1A1A1A", border:`1px solid ${error?"#FF4444":"#333333"}`,
                borderRadius:9, fontSize:14, color:"#FFFFFF",
                outline:"none", fontFamily:"Inter, sans-serif",
              }}
            />
            <button
              onClick={()=>setShow(!show)}
              style={{
                position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
                background:"none", border:"none", cursor:"pointer", padding:0,
                color:"#666666",
              }}>
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none"
                stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
                {show
                  ? <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"/>
                  : <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>
                }
              </svg>
            </button>
          </div>
          {error && (
            <div style={{fontSize:12, color:"#FF4444", marginTop:7, fontWeight:500}}>
              Incorrect password. Please try again.
            </div>
          )}
        </div>

        <button
          onClick={attempt}
          style={{
            width:"100%", padding:"12px 0", background:"#FFFFFF",
            color:"#000000", border:"none", borderRadius:9,
            fontSize:14, fontWeight:700, cursor:"pointer", marginBottom:0,
          }}>
          Unlock Dashboard
        </button>

        <div style={{fontSize:11.5, color:"#444444", marginTop:20}}>
          Authorized personnel only
        </div>
      </div>
    </div>
  );
}

function Ic({n,size=16,color="currentColor"}) {
  const d = PATHS[n];
  if (!d) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      <path d={d}/>
    </svg>
  );
}

/* ── HELPERS ───────────────────────────────────────────────────── */
function sc(t,k){
  const m={acc:{bg:t.accS,fg:t.acc},gold:{bg:t.goldS,fg:t.gold},ok:{bg:t.okS,fg:t.ok},err:{bg:t.errS,fg:t.err},gray:{bg:t.surf2,fg:t.txt2}};
  return m[k]||m.gray;
}
function Badge({t,children,k="gray"}){
  const c=sc(t,k);
  return <span style={{background:c.bg,color:c.fg,fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:999,whiteSpace:"nowrap"}}>{children}</span>;
}

/* ── CHART.JS WRAPPERS ─────────────────────────────────────────── */
function LineChartCJ({data,t}){
  const ref=useRef();
  useEffect(()=>{
    const ctx=ref.current.getContext("2d");
    const ch=new Chart(ctx,{
      type:"line",
      data:{
        labels:data.map(d=>d.m),
        datasets:[
          {label:"Revenue",data:data.map(d=>d.rev),borderColor:"#3457D5",backgroundColor:"rgba(52,87,213,0.1)",borderWidth:2.5,tension:0.4,fill:true,pointRadius:3},
          {label:"Profit",data:data.map(d=>d.profit),borderColor:"#C9932E",borderWidth:2,tension:0.4,fill:false,pointRadius:3}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:t.txt2,font:{size:12}}}},scales:{x:{ticks:{color:t.txt2},grid:{color:t.border}},y:{ticks:{color:t.txt2,callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:t.border}}}}
    });
    return()=>ch.destroy();
  },[]);
  return <canvas ref={ref}/>;
}
function BarChartCJ({data,label,color,t}){
  const ref=useRef();
  useEffect(()=>{
    const ctx=ref.current.getContext("2d");
    const ch=new Chart(ctx,{
      type:"bar",
      data:{labels:data.map(d=>d.name),datasets:[{label,data:data.map(d=>d.value),backgroundColor:color,borderRadius:6}]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:t.txt2,callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:t.border}},y:{ticks:{color:t.txt2},grid:{display:false}}}}
    });
    return()=>ch.destroy();
  },[]);
  return <canvas ref={ref}/>;
}
function DoughnutCJ({data,t}){
  const ref=useRef();
  useEffect(()=>{
    const ctx=ref.current.getContext("2d");
    const colors=["#3457D5","#C9932E","#1D9E75","#D85A30","#7B61D3","#8B8FA3"];
    const ch=new Chart(ctx,{
      type:"doughnut",
      data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.value),backgroundColor:colors,borderWidth:2,borderColor:t.surf}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{color:t.txt2,font:{size:11},boxWidth:12}}}}
    });
    return()=>ch.destroy();
  },[]);
  return <canvas ref={ref}/>;
}

  const expByCat=Object.values(EXPENSES.reduce((a,e)=>{a[e.cat]=a[e.cat]||{name:e.cat,value:0};a[e.cat].value+=e.amount;return a},{}));

          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:28,fontWeight:600,marginTop:8}}>{$$(todayRev)}</div>
          <div style={{fontSize:12,color:"#7B8296",marginTop:4}}>of $0 daily target</div>
          <svg width={70} height={70} viewBox="0 0 128 128" style={{position:"absolute",right:14,top:14}}>
            <circle cx={64} cy={64} r={54} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={10}/>

/* ── CALENDAR ──────────────────────────────────────────────────── */
function CalendarView({t}){
  const [cur,setCur]=useState(new Date());
  const [selDay,setSelDay]=useState(new Date());
  const yr=cur.getFullYear(),mo=cur.getMonth();
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const cells=[...Array(firstDay).fill(null),...Array(daysInMonth).fill(0).map((_,i)=>i+1)];
  const bksOn=day=>day?BOOKINGS.filter(b=>sameDay(b.date,new Date(yr,mo,day))):[];
  const selBks=BOOKINGS.filter(b=>sameDay(b.date,selDay)).sort((a,b)=>a.date-b.date);
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:14}}>
      <Card t={t} style={{padding:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontWeight:600,fontSize:16,color:t.txt}}>{cur.toLocaleDateString(undefined,{month:"long",year:"numeric"})}</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setCur(new Date(yr,mo-1,1))} style={{width:28,height:28,borderRadius:7,border:`1px solid ${t.border}`,background:t.surf2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevL" size={15} color={t.txt2}/></button>
            <button onClick={()=>setCur(new Date(yr,mo+1,1))} style={{width:28,height:28,borderRadius:7,border:`1px solid ${t.border}`,background:t.surf2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevR" size={15} color={t.txt2}/></button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{fontSize:11,fontWeight:700,color:t.txtM,textAlign:"center",padding:"3px 0"}}>{d}</div>)}
          {cells.map((day,i)=>{
            const jobs=bksOn(day);
            const isSel=day&&sameDay(new Date(yr,mo,day),selDay);
            const isToday=day&&sameDay(new Date(yr,mo,day),new Date());
            return (
              <div key={i} onClick={()=>day&&setSelDay(new Date(yr,mo,day))} style={{minHeight:68,borderRadius:9,padding:6,cursor:day?"pointer":"default",border:`1px solid ${isSel?t.acc:t.border}`,background:isSel?t.accS:t.surf2}}>
                {day&&<>
                  <div style={{fontSize:12,fontWeight:isToday?700:500,color:isToday?t.acc:t.txt2}}>{day}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>
                    {jobs.slice(0,4).map(j=>{const c=sc(t,STATUS[j.status]);return <div key={j.id} style={{width:6,height:6,borderRadius:"50%",background:c.fg}}/>;})}</div>
                </>}
              </div>
            );
          })}
        </div>
      </Card>
      <Card t={t} style={{padding:18}}>
        <div style={{fontWeight:600,fontSize:14,color:t.txt,marginBottom:4}}>{selDay.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})}</div>
        <div style={{fontSize:12,color:t.txt2,marginBottom:14}}>{selBks.length} jobs</div>
        {selBks.length===0&&<div style={{fontSize:13,color:t.txtM}}>No jobs scheduled.</div>}
        {selBks.map(b=>{
          const c=CUSTOMERS.find(x=>x.id===b.cid);
          return (
            <div key={b.id} style={{padding:"10px 12px",borderRadius:9,border:`1px solid ${t.border}`,marginBottom:9}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:"IBM Plex Mono,monospace",fontSize:12,color:t.txt2}}>{b.date.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"})}</span>
                <Badge t={t} k={STATUS[b.status]}>{b.status}</Badge>
              </div>
              <div style={{fontWeight:600,fontSize:13.5,color:t.txt,marginTop:4}}>{c?.name}</div>
              <div style={{fontSize:12,color:t.txt2}}>{b.service} · {b.emp}</div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

              </div>
              <div style={{fontFamily:"IBM Plex Mono,monospace",fontWeight:600,fontSize:13.5,color:t.txt}}>{$$(e.amount)}</div>
            </div>
          ))}
        </Card>
        <ChCard t={t} title="Spending by category" height={280}><DoughnutCJ data={byCat} t={t}/></ChCard>
      </div>
    </div>
  );
}

/* ── INVENTORY ─────────────────────────────────────────────────── */
function Inventory({t}){
  const low=INVENTORY.filter(i=>i.stock<=i.min);
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,marginBottom:16}}>
        <KpiCard t={t} label="Total items" value="0" icon="box"/>
        <KpiCard t={t} label="Low stock alerts" value="0" icon="warn" trend={low.length>0?"down":undefined}/>
        <KpiCard t={t} label="Inventory value" value="$0" icon="wallet"/>
      </div>
      {low.length>0&&(
        <div style={{display:"flex",gap:9,flexWrap:"wrap",marginBottom:14}}>
          {low.map(i=>(
            <div key={i.id} style={{display:"flex",alignItems:"center",gap:7,background:t.errS,color:t.err,borderRadius:9,padding:"7px 13px",fontSize:12.5,fontWeight:600}}>
              <Ic n="warn" size={13} color={t.err}/> {i.name} — {i.stock} left (min {i.min})
            </div>
          ))}
        </div>
      )}
      <Card t={t} style={{overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1.6fr 1fr 0.7fr 0.7fr 0.9fr",padding:"11px 18px",borderBottom:`1px solid ${t.border}`,fontSize:11,fontWeight:700,color:t.txtM,textTransform:"uppercase"}}>
          <div>Product</div><div>Supplier</div><div>Stock</div><div>Unit cost</div><div>Status</div>
        </div>
        {INVENTORY.map(i=>(
          <div key={i.id} style={{display:"grid",gridTemplateColumns:"1.6fr 1fr 0.7fr 0.7fr 0.9fr",padding:"13px 18px",borderBottom:`1px solid ${t.border}`,fontSize:13.5,color:t.txt,alignItems:"center"}}>
            <div><div style={{fontWeight:600}}>{i.name}</div><div style={{fontSize:12,color:t.txt2}}>{i.brand}</div></div>
            <div style={{color:t.txt2}}>{i.supplier}</div>
            <div style={{fontFamily:"IBM Plex Mono,monospace"}}>{i.stock}</div>
            <div style={{fontFamily:"IBM Plex Mono,monospace"}}>{$$(i.cost)}</div>
            <Badge t={t} k={i.stock<=i.min?"err":"ok"}>{i.stock<=i.min?"Low stock":"In stock"}</Badge>
          </div>
        ))}
      </Card>
    </div>
  );
}

/* ── EMPLOYEES ─────────────────────────────────────────────────── */
function Employees({t}){
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
      {EMPLOYEES.map(e=>(
        <Card t={t} key={e.id} style={{padding:20}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:42,height:42,borderRadius:"50%",background:t.accS,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:t.acc}}>
              {e.name.split(" ").map(n=>n[0]).join("")}
            </div>
            <div>
              <div style={{fontWeight:600,fontSize:15,color:t.txt}}>{e.name}</div>
              <div style={{fontSize:12,color:t.txt2}}>{e.role}</div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4,color:t.gold,fontWeight:600,fontSize:13}}>
              <Ic n="star" size={13} color={t.gold}/> {e.rating}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <MiniStat t={t} label="Jobs" value={e.jobs}/>
            <MiniStat t={t} label="Revenue" value={$(e.rev)}/>
            <MiniStat t={t} label="Hours" value={e.hrs}/>
            <MiniStat t={t} label="Commission" value={$(e.comm)}/>
          </div>
        </Card>
      ))}
    </div>
  );
}

/* ── ANALYTICS ─────────────────────────────────────────────────── */
function Analytics({t}){
  const topCust=[...CUSTOMERS].map(c=>({name:c.name.split(" ")[0],value:BOOKINGS.filter(b=>b.cid===c.id&&b.status==="Completed").reduce((s,b)=>s+b.total,0)})).sort((a,b)=>b.value-a.value).slice(0,5);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <ChCard t={t} title="Revenue vs profit trend" height={260}><LineChartCJ data={REVENUE_TREND} t={t}/></ChCard>
        <ChCard t={t} title="Top customers by spend" height={260}><BarChartCJ data={topCust} label="Revenue" color="#C9932E" t={t}/></ChCard>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
        <Card t={t} style={{padding:18}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}><Ic n="award" size={16} color={t.gold}/><span style={{fontWeight:600,fontSize:14,color:t.txt}}>Best selling</span></div>
          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:17,fontWeight:600,color:t.txt}}>Ceramic Coating</div>
          <div style={{fontSize:12,color:t.txt2,marginTop:3}}>"$0 revenue this month"</div>
        </Card>
        <Card t={t} style={{padding:18}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}><Ic n="up" size={16} color={t.ok}/><span style={{fontWeight:600,fontSize:14,color:t.txt}}>Customer retention</span></div>
          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:17,fontWeight:600,color:t.txt}}>68%</div>
          <div style={{fontSize:12,color:t.txt2,marginTop:3}}>no data yet</div>
        </Card>
        <Card t={t} style={{padding:18}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}><Ic n="bars" size={16} color={t.acc}/><span style={{fontWeight:600,fontSize:14,color:t.txt}}>Quarterly growth</span></div>
          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:17,fontWeight:600,color:t.txt}}>+24.6%</div>
          <div style={{fontSize:12,color:t.txt2,marginTop:3}}>no data yet</div>
        </Card>
      </div>
    </div>
  );
}

/* ── NOTIFICATIONS ─────────────────────────────────────────────── */
function Notifications({t}){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:620}}>
      {NOTIFS.map(n=>{
        const c=sc(t,n.type);
        return (
          <div key={n.id} style={{display:"flex",alignItems:"center",gap:14,background:t.surf,border:`1px solid ${t.border}`,borderRadius:13,padding:"13px 17px"}}>
            <div style={{width:36,height:36,borderRadius:9,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <Ic n={n.icon} size={16} color={c.fg}/>
            </div>
            <div style={{fontSize:13.5,color:t.txt}}>{n.text}</div>
          </div>
        );
      })}
    </div>
  );
}

/* ── SETTINGS ──────────────────────────────────────────────────── */
function Settings({t}){
  const fields=[["Business name","Bay Area Auto Care"],["Phone","—"],["Email","—"],["Address","—"],["Time zone","Pacific Time (US)"],["Business hours","—"],["Default tax rate","—"]];
  return (
    <Card t={t} style={{padding:22,maxWidth:520}}>
      <div style={{fontWeight:600,fontSize:15,color:t.txt,marginBottom:4}}>Business information</div>
      <div style={{fontSize:13,color:t.txt2,marginBottom:18}}>Connect to Supabase to make settings persistent.</div>
      {fields.map(([label,val])=>(
        <div key={label} style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:t.txtM,marginBottom:6}}>{label}</div>
          <div style={{padding:"9px 13px",borderRadius:9,border:`1px solid ${t.border}`,background:t.surf2,fontSize:13.5,color:t.txt}}>{val}</div>
        </div>
      ))}
    </Card>
  );
}

/* ── SHELL ─────────────────────────────────────────────────────── */
const NAV=[
  {id:"dashboard",label:"Dashboard",icon:"dashboard"},
  {id:"bookings",label:"Bookings",icon:"calendar"},
  {id:"customers",label:"Customers",icon:"users"},
  {id:"calendar",label:"Calendar",icon:"calendar"},
  {id:"invoices",label:"Invoicing",icon:"file"},
  {id:"expenses",label:"Expenses",icon:"wallet"},
  {id:"inventory",label:"Inventory",icon:"box"},
  {id:"employees",label:"Employees",icon:"users"},
  {id:"analytics",label:"Analytics",icon:"bars"},
  {id:"notifications",label:"Notifications",icon:"bell"},
  {id:"settings",label:"Settings",icon:"settings"},
];
const VIEWS={dashboard:Dashboard,bookings:Bookings,customers:Customers,calendar:CalendarView,invoices:Invoices,expenses:Expenses,inventory:Inventory,employees:Employees,analytics:Analytics,notifications:Notifications,settings:Settings};

function App(){
  const [dark,setDark]=useState(false);
  const [view,setView]=useState("dashboard");
  const t=dark?T.dark:T.light;
  const View=VIEWS[view];
  return (
    <div style={{display:"flex",minHeight:"100vh",background:t.bg}}>
      {/* Sidebar */}
      <div style={{width:210,background:t.side,padding:"18px 12px",display:"flex",flexDirection:"column",gap:3,flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,padding:"0 8px",marginBottom:22}}>
          <div style={{width:26,height:26,borderRadius:7,background:t.acc,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="sparkle" size={13} color="#fff"/></div>
          <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:13,fontWeight:700,color:"#fff",lineHeight:1.2}}>Bay Area Auto Care</span>
        </div>
        {NAV.map(n=>{
          const active=view===n.id;
          return (
            <button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 11px",borderRadius:8,border:"none",cursor:"pointer",background:active?"rgba(255,255,255,0.09)":"transparent",color:active?"#fff":t.sideTxt,fontSize:13.5,fontWeight:500,textAlign:"left"}}>
              <Ic n={n.icon} size={15} color={active?"#fff":t.sideTxt}/>{n.label}
            </button>
          );
        })}
        <div style={{marginTop:"auto",padding:"10px 11px",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:t.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#241C0B"}}>OW</div>
          <div>
            <div style={{fontSize:12.5,fontWeight:600,color:"#fff"}}>Owner</div>
            <div style={{fontSize:11,color:t.sideTxt}}>Full access</div>
          </div>
        </div>
      </div>
      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 24px",borderBottom:`1px solid ${t.border}`,background:t.surf,position:"sticky",top:0,zIndex:10}}>
          <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:18,fontWeight:600,color:t.txt}}>{NAV.find(n=>n.id===view)?.label}</span>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{display:"flex",alignItems:"center",gap:7,background:t.surf2,border:`1px solid ${t.border}`,borderRadius:9,padding:"7px 11px",width:200}}>
              <Ic n="search" size={13} color={t.txtM}/>
              <input placeholder="Search everything..." style={{border:"none",outline:"none",background:"transparent",fontSize:13,color:t.txt,width:"100%"}}/>
            </div>
            <button onClick={()=>setDark(!dark)} style={{width:34,height:34,borderRadius:9,border:`1px solid ${t.border}`,background:t.surf2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Ic n={dark?"sun":"moon"} size={15} color={t.txt2}/>
            </button>
            <button style={{display:"flex",alignItems:"center",gap:6,background:t.acc,color:"#fff",border:"none",borderRadius:9,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              <Ic n="plus" size={14} color="#fff"/> New booking
            </button>
          </div>
        </div>
        <div style={{padding:24,overflowY:"auto"}}>
          <View t={t}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PasswordGate><App/></PasswordGate>);
</script>
</body>
</html>
