  /* sync collection from Firestore into cache, returns promise */
  function sync(k){
    return col(k).orderBy('createdAt','asc').get().then(function(snap){
      cache[k] = [];
      snap.forEach(function(doc){
        var d = doc.data();
        d.id = doc.id;
        cache[k].push(d);
      });
      return cache[k];
    }).catch(function(e){
      console.warn('Firestore sync error for '+k, e);
      cache[k] = cache[k] || [];
      return cache[k];
    });
  }

  return {
    /* synchronous read from cache */
    get: function(k){ return cache[k] || []; },

    /* load collection from Firestore, returns promise */
    load: function(k){ return sync(k); },

    /* add doc, returns promise */
    add: function(k, obj){
      obj.id = uid();
      obj.createdAt = new Date().toISOString();
      return col(k).doc(obj.id).set(obj).then(function(){
        if(!cache[k]){ cache[k] = []; }
        cache[k].push(obj);
        return obj;
      });
    },

    /* update doc fields, returns promise */
    update: function(k, id, patch){
      return col(k).doc(id).update(patch).then(function(){
        var a = cache[k] || [];
        var i = a.findIndex(function(x){ return x.id===id; });
        if(i>=0){ a[i] = Object.assign({}, a[i], patch); }
      });
    },

    /* delete doc, returns promise */
    remove: function(k, id){
      return col(k).doc(id).delete().then(function(){
        if(cache[k]){ cache[k] = cache[k].filter(function(x){ return x.id!==id; }); }
      });
    },

    /* find by id from cache */
    find: function(k, id){
      return (cache[k]||[]).find(function(x){ return x.id===id; });
    },

    /* seed default services if none exist */
    seedServices: function(){
      return sync('services').then(function(svcs){
        if(svcs.length > 0){ return; }
        var defs=[
          {name:'Full Detail',price:199,mins:180},
          {name:'Premium Wash & Wax',price:149,mins:90},
          {name:'Full Interior Detail',price:149,mins:90},
          {name:'Maintenance Detail',price:150,mins:60},
          {name:'Ceramic Coating',price:499,mins:300}
        ];
        var promises = defs.map(function(s){ return DB.add('services',s); });
        return Promise.all(promises);
      });
    }
  };
})();

function calFetch(path, method, body){

  return fetch(CAL_BASE+path, opts).then(function(r){

function mapCalToBooking(cb){
  var att = (cb.attendees && cb.attendees[0]) || {};
  var statusMap = {accepted:'Confirmed', cancelled:'Cancelled', pending:'Awaiting Deposit', rejected:'Cancelled'};
  return {
    calUid: cb.uid,
    calId: String(cb.id),
    custId: '',
    vehicle: '--',
    service: cb.title || 'Detail Appointment',
    addOns: '',
    date: cb.start,
    dur: cb.duration || 60,
    emp: (cb.hosts && cb.hosts[0]) ? cb.hosts[0].name : '--',
    status: statusMap[cb.status] || 'Scheduled',
    notes: cb.description || '',
    price: 0, tax: 0, dep: 0, total: 0,
    pay: 'Unpaid', method: '',
    calAttendee: att.name || '',
    calEmail: att.email || '',
    calPhone: att.phoneNumber || '',
    source: 'cal.com'
  };
}

function syncCalToFirebase(onProgress){
  if(onProgress){ onProgress('Connecting to Cal.com...'); }
  return fetchCalBookings().then(function(calBookings){
    if(onProgress){ onProgress('Found '+calBookings.length+' Cal.com bookings. Syncing...'); }
    var existing = DB.get('bookings');
    var calUidMap = {};
    existing.forEach(function(b){ if(b.calUid){ calUidMap[b.calUid] = b.id; } });

    var toAdd = [];
    var toUpdate = [];

    calBookings.forEach(function(cb){
      if(calUidMap[cb.uid]){
        var bk = DB.find('bookings', calUidMap[cb.uid]);
        var statusMap = {accepted:'Confirmed',cancelled:'Cancelled',pending:'Awaiting Deposit',rejected:'Cancelled'};
        var newStatus = statusMap[cb.status] || 'Scheduled';
        if(bk && bk.status !== newStatus && bk.source === 'cal.com'){
          toUpdate.push({id: calUidMap[cb.uid], patch:{status:newStatus, updatedAt:new Date().toISOString()}});
        }
      } else if(cb.status !== 'cancelled' && cb.status !== 'rejected'){
        /* Never import cancelled/rejected Cal.com bookings -- these add
           no business value and were the source of test-data buildup
           in Firestore (a cancelled test booking made on Cal.com kept
           getting re-synced in on every auto-sync). */
        toAdd.push(mapCalToBooking(cb));
      }
    });

    var ps = toAdd.map(function(b){ return DB.add('bookings',b); })
              .concat(toUpdate.map(function(u){ return DB.update('bookings',u.id,u.patch); }));

    return Promise.all(ps).then(function(){
      return DB.load('bookings');
    }).then(function(){
      return {added:toAdd.length, updated:toUpdate.length, total:calBookings.length};
    });
  });
}

/* HELPERS */
function classifyFirestoreError(e){
  var code = (e && e.code) || '';
  var msg = (e && e.message) || String(e);
  if(code==='unavailable' || msg.indexOf('Could not reach Cloud Firestore backend')>=0 || msg.indexOf('unavailable')>=0){
    return {
      title: 'Cannot Reach Firestore',
      detail: 'The app connected to Firebase but Firestore\'s connection is being blocked or dropped -- most commonly by a corporate proxy, VPN, router-level filtering, or a privacy extension that blocks Google\'s streaming API traffic (even though regular Google sites load fine). The app already tries a long-polling fallback automatically. Try a different network (e.g. a phone hotspot) to confirm, or disable VPN/proxy and retry.'
    };
  }
  if(code==='permission-denied' || msg.indexOf('permission-denied')>=0 || msg.indexOf('Missing or insufficient permissions')>=0){
    return {
      title: 'Firestore Permission Denied',
      detail: 'Firestore rejected the request due to Security Rules. In the Firebase Console, go to Firestore Database -> Rules and confirm they allow read/write (e.g. "allow read, write: if true;" for development), then click Publish.'
    };
  }
  if(code==='invalid-argument' || code==='not-found' || msg.indexOf('NOT_FOUND')>=0){
    return {
      title: 'Firestore Database Not Found',
      detail: 'This usually means Firestore was never created for this project, or the projectId in the config doesn\'t match an existing Firestore database. In the Firebase Console, go to Firestore Database and confirm a database exists for project "'+firebaseConfig.projectId+'".'
    };
  }
  if(code==='failed-precondition'){
    return {
      title: 'Firestore Configuration Conflict',
      detail: 'Firestore is open in another tab with incompatible settings, or persistence failed to initialize. Close other tabs of this app and retry.'
    };
  }
  return {
    title: 'Database Error',
    detail: msg
  };
}

function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function parseDate(v){
  if(!v){return null;}
  if(v instanceof Date){return v;}
  /* Date-only strings like "2026-07-01" must be parsed as LOCAL midnight,
     not UTC midnight -- new Date("2026-07-01") parses as UTC, which in
     any timezone behind UTC (all of the US) shifts the date back by one
     day (e.g. July 1 becomes June 30 5pm local). This silently moved
     expenses/bookings into the wrong month in all monthly totals. */
  if(typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v)){
    var parts = v.split('-');
    return new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
  }
  try{return new Date(v);}catch(ex){return null;}
}

/* DASHBOARD */
function Dashboard(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var bookings=DB.get('bookings');
  var expenses=DB.get('expenses');
  var customers=DB.get('customers');
  var today=new Date();
  var todayBks=bookings.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,today);});
  var todayRev=todayBks.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var monthBks=bookings.filter(function(b){var d=parseDate(b.date);return d&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();});
  var monthRev=monthBks.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var monthExp=expenses.filter(function(ex){var d=parseDate(ex.date);return d&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();}).reduce(function(s,ex){return s+(parseFloat(ex.amount)||0);},0);
  var outstanding=bookings.filter(function(b){return b.pay!=='Paid';}).reduce(function(s,b){return s+(parseFloat(b.total)||0)-(parseFloat(b.dep)||0);},0);
  var completedBks=bookings.filter(function(b){return b.status==='Completed';});
  var netProfit=monthRev-monthExp;
  var trendMap={};
  bookings.forEach(function(b){
    var d=parseDate(b.date);
    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(!trendMap[key]){trendMap[key]={m:d.toLocaleDateString('en-US',{month:'short'}),rev:0,profit:0,key:d.getTime()};}
    trendMap[key].rev+=parseFloat(b.total)||0;
  });
  expenses.forEach(function(ex){
    var d=parseDate(ex.date);
    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(trendMap[key]){trendMap[key].profit-=(parseFloat(ex.amount)||0);}
  });
  var trend=Object.values(trendMap).sort(function(a,b){return a.key-b.key;}).slice(-6);
  trend.forEach(function(m){m.profit=m.rev+m.profit;});
  var expByCat={};
  expenses.forEach(function(ex){var c=ex.cat||'Other';expByCat[c]=(expByCat[c]||0)+(parseFloat(ex.amount)||0);});
  var expData=Object.keys(expByCat).map(function(k){return {name:k,value:expByCat[k]};});

  /* Tips are gratuities, tracked and reported separately from revenue. */
  var weekStart=new Date(today); weekStart.setDate(today.getDate()-today.getDay()); weekStart.setHours(0,0,0,0);
  var tipsToday=todayBks.reduce(function(s,b){return s+(parseFloat(b.tip)||0);},0);
  var tipsWeek=bookings.filter(function(b){var d=parseDate(b.date);return d&&d>=weekStart;}).reduce(function(s,b){return s+(parseFloat(b.tip)||0);},0);
  var tipsMonth=monthBks.reduce(function(s,b){return s+(parseFloat(b.tip)||0);},0);
  var tipsYear=bookings.filter(function(b){var d=parseDate(b.date);return d&&d.getFullYear()===today.getFullYear();}).reduce(function(s,b){return s+(parseFloat(b.tip)||0);},0);

  var insightLines=[];
  if(completedBks.length>0){insightLines.push('You have completed '+completedBks.length+' job'+(completedBks.length!==1?'s':'')+' generating '+$$(monthRev)+' in revenue this month.');}
  if(netProfit>0){insightLines.push('Net profit this month is '+$$(netProfit)+' after '+$$(monthExp)+' in expenses.');}
  if(outstanding>0){insightLines.push(bookings.filter(function(b){return b.pay!=='Paid';}).length+' unpaid invoice(s) totaling '+$$(outstanding)+' outstanding.');}
  if(insightLines.length===0){insightLines.push('Add your first booking to start receiving AI-powered insights about your business.');}
  return e('div',{style:{display:'flex',flexDirection:'column',gap:16}},
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14}},

/* BOOKINGS PAGE */
function Bookings(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var onNewBooking=props.onNewBooking;
  var bkS=useState(DB.get('bookings'));
  var bk=bkS[0];
  var setBk=bkS[1];
  var filterS=useState('All');
  var filter=filterS[0];
  var setFilter=filterS[1];
  var selS=useState(null);
  var sel=selS[0];
  var setSel=selS[1];
  var invModalS=useState(false);
  var invModal=invModalS[0];
  var setInvModal=invModalS[1];
  var editBkS=useState({});
  var editBk=editBkS[0];
  var setEditBk=editBkS[1];
  var toastS=useState(null);
  var toast=toastS[0];
  var setToast=toastS[1];
  var savingS=useState(false);
  var saving=savingS[0];
  var setSaving=savingS[1];

  useEffect(function(){DB.load('bookings').then(function(){setBk(DB.get('bookings'));});},[ refresh]);
  useEffect(function(){if(sel){setEditBk(Object.assign({},sel));}},[ sel?sel.id:null]);

  var statuses=['All','New Lead','Quote Sent','Awaiting Deposit','Confirmed','Scheduled','On The Way','In Progress','Completed','Cancelled','No Show'];
  var rows=bk.filter(function(b){return filter==='All'||b.status===filter;}).sort(function(a,b){
    var da=parseDate(a.date);
    var db2=parseDate(b.date);
    return (db2||0)-(da||0);
  });

  function deleteBooking(id){
    if(!confirm('Delete this booking permanently? This cannot be undone.')){return;}
    DB.remove('bookings',id).then(function(){
      DB.load('bookings').then(function(){
        setBk(DB.get('bookings'));
        setSel(null);
        setToast({type:'ok',msg:'Booking deleted.'});
        setTimeout(function(){setToast(null);},3000);
      });
    }).catch(function(err){
      setToast({type:'err',msg:'Delete failed: '+err.message});
    });
  }
  function updateStatus(id,status){
    DB.update('bookings',id,{status:status,updatedAt:new Date().toISOString()}).then(function(){
      DB.load('bookings').then(function(){
        setBk(DB.get('bookings'));
        var updated=DB.find('bookings',id);
        setSel(updated);
        if(updated){setEditBk(Object.assign({},updated));}
        setToast({type:'ok',msg:'Status updated to '+status+'.'});
        setTimeout(function(){setToast(null);},3000);
      });
    });
  }

  return e('div',null,
    e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}},
      e('div',{style:{display:'flex',gap:7,overflowX:'auto',flex:1}},
        statuses.map(function(s){
          return e('button',{
            key:s,
            onClick:function(){setFilter(s);},
            style:{fontSize:12,fontWeight:600,padding:'6px 12px',borderRadius:999,cursor:'pointer',border:'1px solid '+(filter===s?t.acc:t.border),background:filter===s?t.accS:'transparent',color:filter===s?t.acc:t.txt2,whiteSpace:'nowrap',flexShrink:0,fontFamily:'Inter,sans-serif'}
          },s);
        })
      ),
      e(Btn,{t:t,onClick:onNewBooking,style:{flexShrink:0}},e(Ic,{n:'plus',size:14,color:t.bg==='#000000'?'#000':'#fff'}),'New Booking')
    ),
    rows.length===0
      ? e(Empty,{t:t,title:'No bookings',sub:'Click "New Booking" to add your first appointment'})
      : e('div',{style:{overflowX:'auto'}},
          e(Card,{t:t,style:{overflow:'hidden',minWidth:560}},
            e('div',{style:{display:'grid',gridTemplateColumns:'1.5fr 1.2fr 0.9fr 0.8fr 0.8fr 0.9fr',padding:'11px 18px',borderBottom:'1px solid '+t.border,fontSize:11,fontWeight:700,color:t.txtM,textTransform:'uppercase'}},
              e('div',null,'Customer / Service'),
              e('div',null,'Vehicle'),
              e('div',null,'Date'),
              e('div',null,'Employee'),
              e('div',null,'Total'),
              e('div',null,'Status')
            ),
            rows.map(function(b){
              var c=DB.find('customers',b.custId);
              var d=parseDate(b.date);
              return e('div',{
                key:b.id,
                onClick:function(){setSel(b);},

/* CALENDAR PAGE */
function CalendarView(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var curS=useState(new Date());
  var cur=curS[0];
  var setCur=curS[1];
  var selDayS=useState(new Date());
  var selDay=selDayS[0];
  var setSelDay=selDayS[1];
  var syncStatusS=useState('idle');
  var syncStatus=syncStatusS[0];
  var setSyncStatus=syncStatusS[1];
  var syncMsgS=useState('');
  var syncMsg=syncMsgS[0];
  var setSyncMsg=syncMsgS[1];
  var booksS=useState(DB.get('bookings'));
  var books=booksS[0];
  var setBooks=booksS[1];

  useEffect(function(){
    DB.load('bookings').then(function(){setBooks(DB.get('bookings'));});
  },[refresh]);

  function doSync(){
    setSyncStatus('loading');
    setSyncMsg('Connecting to Cal.com...');
    syncCalToFirebase(function(msg){setSyncMsg(msg);})
      .then(function(result){
        setSyncStatus('ok');
        setSyncMsg('Done: +'+result.added+' new, '+result.updated+' updated');
        DB.load('bookings').then(function(){setBooks(DB.get('bookings'));});
        setTimeout(function(){setSyncStatus('idle');setSyncMsg('');},5000);
      })
      .catch(function(err){
        setSyncStatus('err');
        setSyncMsg('Error: '+err.message);
        setTimeout(function(){setSyncStatus('idle');setSyncMsg('');},6000);
      });
  }

  var yr=cur.getFullYear();
  var mo=cur.getMonth();
  var firstDay=new Date(yr,mo,1).getDay();
  var dim=new Date(yr,mo+1,0).getDate();
  var cells=[];
  var i;
  for(i=0;i<firstDay;i++){cells.push(null);}
  for(i=1;i<=dim;i++){cells.push(i);}

  function bksOn(day){
    if(!day){return [];}
    return books.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,new Date(yr,mo,day));});
  }

  var selBks=books.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,selDay);})
    .sort(function(a,b){return (parseDate(a.date)||0)-(parseDate(b.date)||0);});

  var dotColor={acc:t.acc,gold:t.gold,ok:t.ok,err:t.err,gray:t.txtM};

  return e('div',{style:{display:'flex',flexDirection:'column',gap:14}},

    /* Cal.com sync bar */
    e('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:t.surf,border:'1px solid '+t.border,borderRadius:12,flexWrap:'wrap'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}},
        e('div',{style:{width:8,height:8,borderRadius:'50%',flexShrink:0,background:syncStatus==='loading'?'#F59E0B':syncStatus==='ok'?t.ok:syncStatus==='err'?t.err:'#555'}}),
        e('span',{style:{fontSize:13,fontWeight:600,color:t.txt,flexShrink:0}},'Cal.com'),
        e('span',{style:{fontSize:12,color:syncStatus==='err'?t.err:syncStatus==='ok'?t.ok:t.txtM,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
          syncMsg||'Sync your Cal.com appointments into the dashboard'
        )
      ),
      e(Btn,{t:t,variant:'secondary',onClick:doSync,disabled:syncStatus==='loading',style:{flexShrink:0,fontSize:12}},
        syncStatus==='loading'?'Syncing...':'Sync Cal.com Now'
      )
    ),

    /* Calendar + day panel */
    e('div',{style:{display:'grid',gridTemplateColumns:mobile?'1fr':'1fr 300px',gap:14}},

      e(Card,{t:t,style:{padding:18}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
          e('span',{style:{fontWeight:600,fontSize:16,color:t.txt}},cur.toLocaleDateString(undefined,{month:'long',year:'numeric'})),
          e('div',{style:{display:'flex',gap:6}},
            e('button',{onClick:function(){setCur(new Date(yr,mo-1,1));},style:{width:28,height:28,borderRadius:7,border:'1px solid '+t.border,background:t.surf2,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}},e(Ic,{n:'chevL',size:14,color:t.txt2})),
            e('button',{onClick:function(){setCur(new Date());setSelDay(new Date());},style:{padding:'4px 10px',borderRadius:7,border:'1px solid '+t.border,background:t.surf2,cursor:'pointer',fontSize:12,color:t.txt,fontFamily:'Inter,sans-serif'}},'Today'),
            e('button',{onClick:function(){setCur(new Date(yr,mo+1,1));},style:{width:28,height:28,borderRadius:7,border:'1px solid '+t.border,background:t.surf2,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}},e(Ic,{n:'chevR',size:14,color:t.txt2}))
          )
        ),
        e('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}},
          ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(function(d){
            return e('div',{key:d,style:{fontSize:11,fontWeight:700,color:t.txtM,textAlign:'center',padding:'3px 0'}},d);
          }),
          cells.map(function(day,idx){
            var jobs=bksOn(day);
            var isSel=day&&sameDay(new Date(yr,mo,day),selDay);
            var isToday=day&&sameDay(new Date(yr,mo,day),new Date());
            return e('div',{
              key:idx,
              onClick:function(){if(day){setSelDay(new Date(yr,mo,day));}},
              style:{minHeight:mobile?50:68,borderRadius:9,padding:5,cursor:day?'pointer':'default',border:'1px solid '+(isSel?t.acc:t.border),background:isSel?t.accS:t.surf2}
            },
              day?e('div',null,
                e('div',{style:{fontSize:12,fontWeight:isToday?700:500,color:isToday?t.acc:t.txt2}},day),
                e('div',{style:{display:'flex',flexWrap:'wrap',gap:2,marginTop:2}},
                  jobs.slice(0,4).map(function(j,ji){
                    var c=sc(t,SC[j.status]||'gray');
                    return e('div',{key:ji,style:{width:6,height:6,borderRadius:'50%',background:c.fg}});
                  })
                )
              ):null
            );
          })
        )
      ),

      e(Card,{t:t,style:{padding:18}},
        e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:2}},
          selDay.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})
        ),
        e('div',{style:{fontSize:12,color:t.txt2,marginBottom:12}},selBks.length+' job'+(selBks.length!==1?'s':'')+' scheduled'),
        selBks.length===0
          ? e('div',{style:{fontSize:13,color:t.txtM}},'No jobs scheduled.')
          : selBks.map(function(b){
              var c=DB.find('customers',b.custId);
              var d=parseDate(b.date);
              var isCalCom=b.source==='cal.com';
              return e('div',{key:b.id,style:{padding:'10px 12px',borderRadius:9,border:'1px solid '+(isCalCom?t.gold:t.border),marginBottom:8}},
                e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
                  e('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:t.txt2}},d?d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}):'--'),
                    isCalCom?e('span',{style:{fontSize:10,fontWeight:700,color:t.gold,background:t.goldS,padding:'2px 6px',borderRadius:4,marginLeft:4}},'CAL.COM'):null
                  ),
                  e(Badge,{t:t,k:SC[b.status]||'gray'},b.status)
                ),
                e('div',{style:{fontWeight:600,fontSize:13.5,color:t.txt}},c?c.name:b.calAttendee||'--'),
                e('div',{style:{fontSize:12,color:t.txt2}},b.service),
                isCalCom&&b.calUid?e('button',{
                  onClick:function(){
                    if(!confirm('Cancel this Cal.com appointment?')){return;}
                    cancelOnCal(b.calUid,'Cancelled from dashboard').then(function(){
                      return DB.update('bookings',b.id,{status:'Cancelled',updatedAt:new Date().toISOString()});
                    }).then(function(){
                      return DB.load('bookings');
                    }).then(function(){
                      setBooks(DB.get('bookings'));
                    }).catch(function(err){alert('Cancel failed: '+err.message);});
                  },
                  style:{marginTop:6,width:'100%',padding:'5px 0',borderRadius:7,border:'none',background:t.errS,color:t.err,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}
                },'Cancel on Cal.com'):null
              );
            })
      )
    )
  );
}


/* INVOICES PAGE */
function Invoices(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var invS=useState(DB.get('invoices'));
  var invs=invS[0];
  var setInvs=invS[1];
  var filterS=useState('All');
  var filter=filterS[0];
  var setFilter=filterS[1];
  var modalS=useState(false);
  var modal=modalS[0];
  var setModal=modalS[1];
  var selS=useState(null);
  var sel=selS[0];
  var setSel=selS[1];

  useEffect(function(){DB.load('invoices').then(function(){setInvs(DB.get('invoices'));});},[ refresh]);
  function reload(){setInvs(DB.get('invoices'));}

  var shown=invs.filter(function(inv){return filter==='All'||inv.status===filter;}).sort(function(a,b){
    return new Date(b.createdAt||0)-new Date(a.createdAt||0);
  });
  var collected=invs.filter(function(inv){return inv.status==='Paid';}).reduce(function(s,inv){return s+(parseFloat(inv.total)||0);},0);
  var outstanding=invs.filter(function(inv){return inv.status!=='Paid';}).reduce(function(s,inv){return s+(parseFloat(inv.total)||0);},0);

    DB.update('invoices',id,{status:'Paid',paidDate:new Date().toISOString().slice(0,10)}).then(function(){
      reload();
      setSel(DB.find('invoices',id));

function Analytics(props){
  var t=props.t;

  var totalExp=expenses.reduce(function(s,ex){return s+(parseFloat(ex.amount)||0);},0);
  var svcMap={};
  completed.forEach(function(b){svcMap[b.service]=(svcMap[b.service]||0)+(parseFloat(b.total)||0);});
  var topSvcs=Object.keys(svcMap).map(function(k){return {name:k,value:svcMap[k]};}).sort(function(a,b){return b.value-a.value;}).slice(0,5);
  var custMap={};
  completed.forEach(function(b){custMap[b.custId]=(custMap[b.custId]||0)+(parseFloat(b.total)||0);});
  var topCusts=Object.keys(custMap).map(function(id){
    var c=DB.find('customers',id);
    return {name:c?c.name:'Unknown',value:custMap[id]};
  }).sort(function(a,b){return b.value-a.value;}).slice(0,5);
  var trendMap={};
  bookings.forEach(function(b){
    var d=parseDate(b.date);
    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(!trendMap[key]){trendMap[key]={m:d.toLocaleDateString('en-US',{month:'short'}),rev:0,profit:0,tips:0,key:d.getTime()};}

  expenses.forEach(function(ex){

    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);

  });
  var trend=Object.values(trendMap).sort(function(a,b){return a.key-b.key;}).slice(-6);

      e(KpiCard,{t:t,label:'Jobs Completed',value:completed.length,icon:'check'}),
      e(KpiCard,{t:t,label:'Avg Ticket',value:completed.length?$$(totalRev/completed.length):'$0',icon:'star'}),
      e(KpiCard,{t:t,label:'Total Customers',value:customers.length,icon:'users'}),
      e(KpiCard,{t:t,label:'Total Tips (gratuities)',value:$$(totalTips),icon:'sparkle'})
    ),
    trend.length>0
      ? e('div',{style:{display:'grid',gridTemplateColumns:mobile?'1fr':'1fr 1fr',gap:14}},
          e(Card,{t:t},
            e('div',{style:{padding:'14px 18px 0',fontWeight:600,fontSize:14,color:t.txt}},'Revenue vs Profit'),
            e('div',{style:{height:240,padding:'8px 12px 14px'}},e(LineChart,{data:trend,t:t}))
          ),
          topSvcs.length>0
            ? e(Card,{t:t,style:{padding:18}},
                e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:12}},'Top Services by Revenue'),
                topSvcs.map(function(s){
                  return e('div',{key:s.name,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid '+t.border,fontSize:13}},
                    e('span',{style:{color:t.txt}},s.name),
                    e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:t.txt}},$$(s.value))
                  );
                })
              )
            : null
        )
      : e(Empty,{t:t,title:'No data yet',sub:'Add bookings and expenses to see analytics'}),
    topCusts.length>0
      ? e(Card,{t:t,style:{padding:18}},
          e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:12}},'Top Customers by Revenue'),
          topCusts.map(function(c){

              e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:t.txt}},$$(c.value))

/* NOTIFICATIONS PAGE */
function Notifications(props){
  var t=props.t;
  var bookings=DB.get('bookings');
  var today=new Date();
  var notifs=[];
  var unpaid=bookings.filter(function(b){return b.pay!=='Paid'&&b.status!=='Cancelled'&&b.status!=='No Show';});
  if(unpaid.length>0){
    notifs.push({type:'err',icon:'receipt',text:unpaid.length+' unpaid booking'+(unpaid.length!==1?'s':'')+' totaling '+$$(unpaid.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0))+' outstanding.'});
  }
  var todayBks=bookings.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,today);});
  if(todayBks.length>0){notifs.push({type:'acc',icon:'calendar',text:todayBks.length+' job'+(todayBks.length!==1?'s':'')+' scheduled for today.'});}
  var upcoming=bookings.filter(function(b){var d=parseDate(b.date);return d&&d>today&&(d-today)<3*24*60*60*1000;});
  if(upcoming.length>0){notifs.push({type:'gold',icon:'clock',text:upcoming.length+' job'+(upcoming.length!==1?'s':'')+' coming up in the next 3 days.'});}
  /* Recurring appointment reminders */
  var recurringBks=DB.get('bookings').filter(function(b){return b.recurring&&b.recurring!=='None'&&b.status==='Completed';});
  recurringBks.forEach(function(b){
    var d=parseDate(b.date);
    if(!d){return;}
    var intervalMap={'Monthly':30,'Every 2 Months':60,'Every 3 Months':90,'Every 6 Months':180,'Yearly':365};
    var days=intervalMap[b.recurring]||30;
    var nextDue=new Date(d.getTime()+days*24*60*60*1000);
    var daysUntil=Math.round((nextDue-today)/(24*60*60*1000));
    if(daysUntil>=0&&daysUntil<=7){
      var cust=DB.find('customers',b.custId);
      notifs.push({type:'gold',icon:'clock',text:'Recurring: '+(cust?cust.name:'Customer')+' ('+b.service+') is due in '+daysUntil+' day'+(daysUntil!==1?'s':'')+' ('+b.recurring+' schedule).'});
    }
  });
  if(notifs.length===0){notifs.push({type:'gray',icon:'check',text:'All clear! No urgent notifications.'});}
  return e('div',{style:{display:'flex',flexDirection:'column',gap:10,maxWidth:600}},
    notifs.map(function(n,i){
      var c=sc(t,n.type);
      return e(Card,{t:t,key:i,style:{padding:'14px 18px',display:'flex',alignItems:'center',gap:14}},
        e('div',{style:{width:36,height:36,borderRadius:9,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
          e(Ic,{n:n.icon,size:16,color:c.fg})
        ),
        e('div',{style:{fontSize:13.5,color:t.txt}},n.text)
      );
    })
  );
}

/* MOBILE HOOK */
function useIsMobile(){
  var s=useState(window.innerWidth<=768);
  var mobile=s[0];
  var setMobile=s[1];
  useEffect(function(){
    function fn(){setMobile(window.innerWidth<=768);}
    window.addEventListener('resize',fn);
    return function(){window.removeEventListener('resize',fn);};
  },[]);
  return mobile;
}

/* ════════════════════════════════════════════════════
   PROFIT DASHBOARD PAGE
════════════════════════════════════════════════════ */
function ProfitDashboard(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var bookings=DB.get('bookings');
  var expenses=DB.get('expenses');
  var today=new Date();

  var completed=bookings.filter(function(b){return b.status==='Completed';});
  var thisMonth=completed.filter(function(b){var d=parseDate(b.date);return d&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();});
  var thisYear=completed.filter(function(b){var d=parseDate(b.date);return d&&d.getFullYear()===today.getFullYear();});

  var grossRev=completed.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var totalTax=completed.reduce(function(s,b){return s+(parseFloat(b.tax)||0);},0);
  var totalTips=completed.reduce(function(s,b){return s+(parseFloat(b.tip)||0);},0);
  var totalExp=expenses.reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  var netProfit=grossRev-totalExp;
  var profitMargin=grossRev>0?((netProfit/grossRev)*100).toFixed(1):0;
  var avgProfitPerJob=completed.length>0?(netProfit/completed.length).toFixed(2):0;

  var monthRev=thisMonth.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var monthExp=expenses.filter(function(e){var d=parseDate(e.date);return d&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();}).reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  var monthProfit=monthRev-monthExp;

  var yearRev=thisYear.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var yearExp=expenses.filter(function(e){var d=parseDate(e.date);return d&&d.getFullYear()===today.getFullYear();}).reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  var yearProfit=yearRev-yearExp;

  /* Profit by service */
  var svcProfit={};
  completed.forEach(function(b){var s=b.service||'Unknown';svcProfit[s]=(svcProfit[s]||0)+(parseFloat(b.total)||0);});
  var topSvcs=Object.keys(svcProfit).map(function(k){return{name:k,value:svcProfit[k]};}).sort(function(a,b){return b.value-a.value;}).slice(0,5);

  /* Profit by employee */
  var empProfit={};
  completed.forEach(function(b){var e=b.emp||'Unassigned';empProfit[e]=(empProfit[e]||0)+(parseFloat(b.total)||0);});
  var empData=Object.keys(empProfit).map(function(k){return{name:k,value:empProfit[k]};}).sort(function(a,b){return b.value-a.value;});

  /* Outstanding */
  var outstanding=bookings.filter(function(b){return b.pay!=='Paid'&&b.status!=='Cancelled';}).reduce(function(s,b){return s+(parseFloat(b.total)||0)-(parseFloat(b.dep)||0);},0);

  /* Monthly trend for chart */
  var trendMap={};
  bookings.forEach(function(b){var d=parseDate(b.date);if(!d){return;}var key=d.getFullYear()+'-'+(d.getMonth()+1);if(!trendMap[key]){trendMap[key]={m:d.toLocaleDateString('en-US',{month:'short'}),rev:0,exp:0,profit:0,tips:0,key:d.getTime()};}trendMap[key].rev+=parseFloat(b.total)||0;trendMap[key].tips+=parseFloat(b.tip)||0;});
  expenses.forEach(function(e){var d=parseDate(e.date);if(!d){return;}var key=d.getFullYear()+'-'+(d.getMonth()+1);if(trendMap[key]){trendMap[key].exp+=parseFloat(e.amount)||0;}});
  var trend=Object.values(trendMap).sort(function(a,b){return a.key-b.key;}).slice(-6);
  trend.forEach(function(m){m.profit=m.rev-m.exp;});

  function ProfitChart(){
    var ref=useRef(null);
    useEffect(function(){
      if(!ref.current||!window.Chart){return;}
      var ctx=ref.current.getContext('2d');
      var ch=new Chart(ctx,{type:'bar',data:{labels:trend.map(function(d){return d.m;}),datasets:[{label:'Revenue',data:trend.map(function(d){return d.rev;}),backgroundColor:'rgba(80,80,80,0.6)',borderRadius:4},{label:'Expenses',data:trend.map(function(d){return d.exp;}),backgroundColor:'rgba(220,50,50,0.6)',borderRadius:4},{label:'Profit',data:trend.map(function(d){return d.profit;}),backgroundColor:'rgba(34,197,94,0.7)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:t.txt2,font:{size:11}}}},scales:{x:{ticks:{color:t.txt2},grid:{color:t.border}},y:{ticks:{color:t.txt2,callback:function(v){return '$'+Math.round(v/1000)+'k';}},grid:{color:t.border}}}}});
      return function(){ch.destroy();};
    },[]);
    return e('canvas',{ref:ref,style:{width:'100%',height:'100%'}});
  }

  return e('div',{style:{display:'flex',flexDirection:'column',gap:16}},
    /* KPI Grid */
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:12}},
      e(KpiCard,{t:t,label:'Gross Revenue',value:$$(grossRev),icon:'dollar'}),
      e(KpiCard,{t:t,label:'Net Profit',value:$$(netProfit),icon:netProfit>=0?'up':'down',trend:netProfit>=0?'up':'down'}),
      e(KpiCard,{t:t,label:'Profit Margin',value:profitMargin+'%',icon:'star',trend:parseFloat(profitMargin)>=50?'up':'down'}),
      e(KpiCard,{t:t,label:'Monthly Profit',value:$$(monthProfit),icon:'bars',trend:monthProfit>=0?'up':'down'}),
      e(KpiCard,{t:t,label:'Yearly Profit',value:$$(yearProfit),icon:'up',trend:yearProfit>=0?'up':'down'}),
      e(KpiCard,{t:t,label:'Avg Profit/Job',value:$$(parseFloat(avgProfitPerJob)),icon:'sparkle'}),
      e(KpiCard,{t:t,label:'Taxes Collected',value:$$(totalTax),icon:'receipt'}),
      e(KpiCard,{t:t,label:'Total Tips',value:$$(totalTips),icon:'sparkle'}),
      e(KpiCard,{t:t,label:'Outstanding',value:$$(outstanding),icon:'warn',trend:'down'}),
      e(KpiCard,{t:t,label:'Total Expenses',value:$$(totalExp),icon:'wallet',trend:'down'})
    ),
    /* Chart */
    trend.length>0?e(Card,{t:t},
      e('div',{style:{padding:'14px 18px 0',fontWeight:600,fontSize:14,color:t.txt}},'Revenue vs Expenses vs Profit'),
      e('div',{style:{height:260,padding:'8px 12px 14px'}},e(ProfitChart,null))
    ):e(Card,{t:t,style:{padding:40,textAlign:'center'}},e(Empty,{t:t,title:'No data yet',sub:'Complete bookings to see profit trends'})),
    /* By Service / By Employee */
    e('div',{style:{display:'grid',gridTemplateColumns:mobile?'1fr':'1fr 1fr',gap:14}},
      e(Card,{t:t,style:{padding:18}},
        e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:12}},'Revenue by Service'),
        topSvcs.length===0?e('div',{style:{color:t.txtM,fontSize:13}},'No completed jobs yet.'):
        topSvcs.map(function(s){
          var pct=grossRev>0?(s.value/grossRev*100).toFixed(0):0;
          return e('div',{key:s.name,style:{marginBottom:10}},
            e('div',{style:{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}},
              e('span',{style:{color:t.txt}},s.name),
              e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:t.txt}},$$(s.value))
            ),
            e('div',{style:{height:4,background:t.surf2,borderRadius:2}},
              e('div',{style:{height:4,background:t.acc,borderRadius:2,width:pct+'%'}})
            )
          );
        })
      ),
      e(Card,{t:t,style:{padding:18}},
        e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:12}},'Revenue by Employee'),
        empData.length===0?e('div',{style:{color:t.txtM,fontSize:13}},'No completed jobs yet.'):
        empData.map(function(s){
          var pct=grossRev>0?(s.value/grossRev*100).toFixed(0):0;
          return e('div',{key:s.name,style:{marginBottom:10}},
            e('div',{style:{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}},
              e('span',{style:{color:t.txt}},s.name),
              e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:t.txt}},$$(s.value))
            ),
            e('div',{style:{height:4,background:t.surf2,borderRadius:2}},
              e('div',{style:{height:4,background:t.gold,borderRadius:2,width:pct+'%'}})
            )
          );
        })
      )
    )
  );
}

/* ════════════════════════════════════════════════════
   CASH FLOW PAGE
════════════════════════════════════════════════════ */
function CashFlow(props){
  var t=props.t;
  var mobile=props.mobile;
  var bookings=DB.get('bookings');
  var expenses=DB.get('expenses');
  var today=new Date();

  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var cashMap={};
  bookings.filter(function(b){return b.status==='Completed';}).forEach(function(b){
    var d=parseDate(b.date);if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(!cashMap[key]){cashMap[key]={m:months[d.getMonth()]+' '+d.getFullYear().toString().slice(2),rev:0,exp:0,tips:0,tax:0,key:d.getTime()};}
    cashMap[key].rev+=parseFloat(b.total)||0;
    cashMap[key].tips+=parseFloat(b.tip)||0;
    cashMap[key].tax+=parseFloat(b.tax)||0;
  });
  expenses.forEach(function(e){
    var d=parseDate(e.date);if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(cashMap[key]){cashMap[key].exp+=parseFloat(e.amount)||0;}
  });
  var rows=Object.values(cashMap).sort(function(a,b){return b.key-a.key;}).slice(0,12);

  var totalRev=rows.reduce(function(s,r){return s+r.rev;},0);
  var totalExp=rows.reduce(function(s,r){return s+r.exp;},0);
  var totalTips=rows.reduce(function(s,r){return s+r.tips;},0);
  var totalTax=rows.reduce(function(s,r){return s+r.tax;},0);
  var outstanding=bookings.filter(function(b){return b.pay!=='Paid'&&b.status!=='Cancelled';}).reduce(function(s,b){return s+(parseFloat(b.total)||0)-(parseFloat(b.dep)||0);},0);
  var netCash=totalRev-totalExp;

  return e('div',{style:{display:'flex',flexDirection:'column',gap:16}},
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}},
      e(KpiCard,{t:t,label:'Total Revenue',value:$$(totalRev),icon:'dollar'}),
      e(KpiCard,{t:t,label:'Total Expenses',value:$$(totalExp),icon:'wallet',trend:'down'}),
      e(KpiCard,{t:t,label:'Net Cash Flow',value:$$(netCash),icon:netCash>=0?'up':'down',trend:netCash>=0?'up':'down'}),
      e(KpiCard,{t:t,label:'Taxes Collected',value:$$(totalTax),icon:'receipt'}),
      e(KpiCard,{t:t,label:'Tips Received',value:$$(totalTips),icon:'sparkle'}),
      e(KpiCard,{t:t,label:'Outstanding',value:$$(outstanding),icon:'warn',trend:'down'})
    ),
    rows.length===0?e(Card,{t:t,style:{padding:40,textAlign:'center'}},e(Empty,{t:t,title:'No cash flow data',sub:'Complete bookings to see cash flow'})):
    e(Card,{t:t,style:{overflow:'hidden'}},
      e('div',{style:{padding:'14px 18px',fontWeight:600,fontSize:14,color:t.txt,borderBottom:'1px solid '+t.border}},'Monthly Cash Flow'),
      e('div',{style:{overflowX:'auto'}},
        e('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:13}},
          e('thead',null,
            e('tr',{style:{background:t.surf2}},
              ['Month','Revenue','Expenses','Net Profit','Tips','Tax'].map(function(h){
                return e('th',{key:h,style:{padding:'10px 16px',textAlign:'left',fontWeight:700,color:t.txtM,fontSize:11,textTransform:'uppercase',letterSpacing:'0.5px'}},h);
              })
            )
          ),
          e('tbody',null,
            rows.map(function(r){
              var profit=r.rev-r.exp;
              return e('tr',{key:r.key,style:{borderBottom:'1px solid '+t.border}},
                e('td',{style:{padding:'12px 16px',color:t.txt,fontWeight:600}},r.m),
                e('td',{style:{padding:'12px 16px',fontFamily:"'IBM Plex Mono',monospace",color:t.txt}},$$(r.rev)),
                e('td',{style:{padding:'12px 16px',fontFamily:"'IBM Plex Mono',monospace",color:t.err}},$$(r.exp)),
                e('td',{style:{padding:'12px 16px',fontFamily:"'IBM Plex Mono',monospace",color:profit>=0?t.ok:t.err,fontWeight:700}},$$(profit)),
                e('td',{style:{padding:'12px 16px',fontFamily:"'IBM Plex Mono',monospace",color:t.gold}},$$(r.tips)),
                e('td',{style:{padding:'12px 16px',fontFamily:"'IBM Plex Mono',monospace",color:t.txt2}},$$(r.tax))
              );
            })
          )
        )
      )
    )
  );
}

/* ════════════════════════════════════════════════════
   REFERRAL ANALYTICS
════════════════════════════════════════════════════ */
function ReferralAnalytics(props){
  var t=props.t;
  var mobile=props.mobile;
  var customers=DB.get('customers');
  var bookings=DB.get('bookings');

  var refMap={};
  customers.forEach(function(c){
    var src=c.referral||'Unknown';
    if(!refMap[src]){refMap[src]={name:src,customers:0,revenue:0};}
    refMap[src].customers++;
  });
  bookings.filter(function(b){return b.status==='Completed';}).forEach(function(b){
    var c=DB.find('customers',b.custId);
    if(!c){return;}
    var src=c.referral||'Unknown';
    if(refMap[src]){refMap[src].revenue+=parseFloat(b.total)||0;}
  });
  var data=Object.values(refMap).sort(function(a,b){return b.revenue-a.revenue;});
  var totalCusts=customers.length;

  return e('div',{style:{display:'flex',flexDirection:'column',gap:16}},
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}},
      e(KpiCard,{t:t,label:'Total Customers',value:totalCusts,icon:'users'}),
      e(KpiCard,{t:t,label:'Referral Sources',value:data.length,icon:'star'}),
      e(KpiCard,{t:t,label:'Top Source',value:data.length?data[0].name:'--',icon:'up'})
    ),
    data.length===0?e(Card,{t:t,style:{padding:40,textAlign:'center'}},e(Empty,{t:t,title:'No referral data',sub:'Add customers with a referral source to see analytics'})):
    e(Card,{t:t,style:{padding:18}},
      e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:14}},'Customers & Revenue by Referral Source'),
      data.map(function(row){
        var pct=totalCusts>0?((row.customers/totalCusts)*100).toFixed(0):0;
        return e('div',{key:row.name,style:{marginBottom:16}},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
            e('span',{style:{fontWeight:600,color:t.txt,fontSize:14}},row.name),
            e('div',{style:{display:'flex',gap:14,fontSize:12}},
              e('span',{style:{color:t.txt2}},row.customers+' customer'+(row.customers!==1?'s':'')+' ('+pct+'%)'),
              e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,color:t.txt}},$$(row.revenue))
            )
          ),
          e('div',{style:{height:5,background:t.surf2,borderRadius:3}},
            e('div',{style:{height:5,background:t.acc,borderRadius:3,width:pct+'%',transition:'width 0.3s'}})
          )
        );
      })
    )
  );
}

/* APP SHELL */
function App(){
  var ds=useState(false);var dark=ds[0];var setDark=ds[1];
  var vs=useState('dashboard');var view=vs[0];var setView=vs[1];
  var ms=useState(false);var menuOpen=ms[0];var setMenuOpen=ms[1];
  var rs=useState(0);var refresh=rs[0];var setRefresh=rs[1];
  var bms=useState(false);var bookingModal=bms[0];var setBookingModal=bms[1];
  var loadingS=useState(true);var loading=loadingS[0];var setLoading=loadingS[1];
  var loadErrS=useState(null);var loadErr=loadErrS[0];var setLoadErr=loadErrS[1];
  var t=dark?T.dark:T.light;
  var mobile=useIsMobile();
  var View=VIEWS[view];
  function navTo(id){setView(id);setMenuOpen(false);}
  function reload(){
    var cols=['bookings','customers','employees','expenses','invoices','services'];
    Promise.all(cols.map(function(c){return DB.load(c);})).then(function(){
      setRefresh(function(r){return r+1;});
    }).catch(function(e){console.warn('reload error:',e);});
  }

  /* Load all core data from Firestore on mount.
     Cal.com sync is intentionally NOT part of this chain -- it runs
     separately afterward so a Cal.com failure can never block the
     database connection, the login screen, or the dashboard. */
  useEffect(function(){
    var cols=['bookings','customers','employees','expenses','invoices','services'];
    Promise.all(cols.map(function(c){return DB.load(c);}))
      .then(function(){
        return DB.seedServices();
      })
      .then(function(){
        return DB.load('services');
      })
      .then(function(){
        setLoading(false);
      })
      .catch(function(e){
        console.error('Firestore load error:', e);
        setLoadErr(classifyFirestoreError(e));
        setLoading(false);
      });
  },[]);

  /* Cal.com sync -- fully isolated from database load. Runs once the
     dashboard is already up. If Cal.com is unreachable, misconfigured,
     or the key is invalid, this only logs a warning and never touches
     loadErr or the loading screen. */
  useEffect(function(){
    if(loading){return;}
    var timer=setTimeout(function(){
      try{
        syncCalToFirebase(function(){}).then(function(){
          setRefresh(function(r){return r+1;});
        }).catch(function(e){
          console.warn('Cal.com sync skipped:',e.message);
        });
      }catch(e){
        console.warn('Cal.com sync unavailable:',e.message);
      }
    },1500);
    return function(){clearTimeout(timer);};
  },[loading]);

  if(loading){
    return e('div',{style:{minHeight:'100vh',background:'#000',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},
      e('div',{style:{width:40,height:40,border:'3px solid #333',borderTop:'3px solid #fff',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
      e('div',{style:{color:'#666',fontSize:14,fontFamily:'Inter,sans-serif'}},'Connecting to database...'),
      e('style',null,'@keyframes spin{to{transform:rotate(360deg)}}')
    );
  }
  if(loadErr){
    return e('div',{style:{minHeight:'100vh',background:'#000',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,padding:24}},
      e('div',{style:{color:'#FF4444',fontSize:17,fontWeight:700,fontFamily:'Inter,sans-serif',textAlign:'center'}},loadErr.title),
      e('div',{style:{color:'#999',fontSize:13,fontFamily:'Inter,sans-serif',textAlign:'center',maxWidth:440,lineHeight:1.6}},loadErr.detail),
      e('div',{style:{display:'flex',gap:10,marginTop:10}},
        e('button',{onClick:function(){window.location.reload();},style:{padding:'10px 20px',background:'#fff',color:'#000',border:'none',borderRadius:9,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}},'Retry'),
        e('button',{onClick:function(){setLoadErr(null);setLoading(true);
          var cols=['bookings','customers','employees','expenses','invoices','services'];
          Promise.all(cols.map(function(c){return DB.load(c);}))
            .then(function(){return DB.seedServices();})
            .then(function(){return DB.load('services');})
            .then(function(){setLoading(false);})
            .catch(function(e){console.error('Firestore retry error:',e);setLoadErr(classifyFirestoreError(e));setLoading(false);});
        },style:{padding:'10px 20px',background:'#1A1A1A',color:'#fff',border:'1px solid #333',borderRadius:9,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}},'Retry Without Reload')
      )
    );
  }

  function SidebarLinks(){
