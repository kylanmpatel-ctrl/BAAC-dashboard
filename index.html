    strokeLinecap: 'round', strokeLinejoin: 'round'
  }, e('path', {d: d}));
}

    var ctx = ref.current.getContext('2d');
    var ch = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map(function(d){return d.m;}),

    });

  }, []);
  return e('canvas', {ref: ref, style:{width:'100%',height:'100%'}});
}

}

/* ── PASSWORD GATE ── */
function PasswordGate(props) {
  var s = useState(false); var unlocked=s[0]; var setUnlocked=s[1];
  var s2 = useState(''); var input=s2[0]; var setInput=s2[1];
  var s3 = useState(false); var error=s3[0]; var setError=s3[1];
  var s4 = useState(false); var show=s4[0]; var setShow=s4[1];

  if (unlocked) return props.children;

  function attempt() {
    if (input === PASSWORD) { setUnlocked(true); }
    else { setError(true); setInput(''); }
  }

  return e('div', {style:{minHeight:'100vh',background:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,sans-serif'}},
    e('div', {style:{background:'#111',border:'1px solid #2A2A2A',borderRadius:16,padding:'44px 36px',width:340,maxWidth:'92vw',display:'flex',flexDirection:'column',alignItems:'center'}},

        e('svg', {width:24,height:24,viewBox:'0 0 24 24',fill:'none',stroke:'#000',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
          e('path', {d:'M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h11l5 5v5h-2M7 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM17 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4z'})
        )

      e('div', {style:{fontSize:20,fontWeight:700,color:'#fff',marginBottom:4,textAlign:'center'}}, 'Bay Area Auto Care'),
      e('div', {style:{fontSize:13,color:'#666',marginBottom:26,textAlign:'center'}}, 'Business Management Portal'),
      e('div', {style:{width:'100%',marginBottom:10}},
        e('div', {style:{fontSize:11,fontWeight:600,color:'#888',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}, 'Password'),
        e('input', {
          type: show ? 'text' : 'password',
          value: input,
          placeholder: 'Enter password',
          autoFocus: true,
          onChange: function(ev){setInput(ev.target.value);setError(false);},
          onKeyDown: function(ev){if(ev.key==='Enter')attempt();},

        onClick: attempt,

      }, 'Unlock Dashboard'),
      e('div', {style:{fontSize:11,color:'#444'}}, 'Authorized personnel only')
    )

}

  var s = useState(window.innerWidth <= 768); var mobile=s[0]; var setMobile=s[1];

    e('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:14}},

          e(Ic, {n:'sparkle', size:16, color:t.gold}),
          e('span', {style:{fontWeight:600,fontSize:14,color:t.txt}}, 'AI Business Insights')
