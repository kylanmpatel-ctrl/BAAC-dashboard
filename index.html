/* DB - Firestore wrapper with localStorage cache for instant reads */
var DB = (function(){
  /* local cache so UI feels instant */
  var cache = {};

  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

  function col(k){ return db.collection(k); }

  /* sync collection from Firestore into cache, returns promise */
  function sync(k){
    return col(k).orderBy('createdAt','asc').get().then(function(snap){
      cache[k] = [];
      snap.forEach(function(doc){
        var d = doc.data();
        d.id = doc.id;
        cache[k].push(d);
      });
      return cache[k];
    }).catch(function(e){
      console.warn('Firestore sync error for '+k, e);
      cache[k] = cache[k] || [];
      return cache[k];
    });
  }

  return {
    /* synchronous read from cache */
    get: function(k){ return cache[k] || []; },

    /* load collection from Firestore, returns promise */
    load: function(k){ return sync(k); },

    /* add doc, returns promise */
    add: function(k, obj){
      obj.id = uid();
      obj.createdAt = new Date().toISOString();
      return col(k).doc(obj.id).set(obj).then(function(){
        if(!cache[k]){ cache[k] = []; }
        cache[k].push(obj);
        return obj;
      });
    },

    /* update doc fields, returns promise */
    update: function(k, id, patch){
      return col(k).doc(id).update(patch).then(function(){
        var a = cache[k] || [];
        var i = a.findIndex(function(x){ return x.id===id; });
        if(i>=0){ a[i] = Object.assign({}, a[i], patch); }
      });
    },

    /* delete doc, returns promise */
    remove: function(k, id){
      return col(k).doc(id).delete().then(function(){
        if(cache[k]){ cache[k] = cache[k].filter(function(x){ return x.id!==id; }); }
      });
    },

    /* find by id from cache */
    find: function(k, id){
      return (cache[k]||[]).find(function(x){ return x.id===id; });
    },

    /* seed default services if none exist */
    seedServices: function(){
      return sync('services').then(function(svcs){
        if(svcs.length > 0){ return; }
        var defs=[
          {name:'Full Detail',price:199,mins:180},
          {name:'Premium Wash & Wax',price:149,mins:90},
          {name:'Full Interior Detail',price:149,mins:90},
          {name:'Maintenance Detail',price:150,mins:60},
          {name:'Ceramic Coating',price:499,mins:300}
        ];
        var promises = defs.map(function(s){ return DB.add('services',s); });
        return Promise.all(promises);
      });
    }
  };
})();

var CAL_API_KEY = 'cal_live_9132dfa3d8da6495db1493b7124fef2b';
var CAL_BASE = 'https://api.cal.com/v2';
var CAL_HDR = {'Authorization':'Bearer '+CAL_API_KEY,'cal-api-version':'2024-08-13','Content-Type':'application/json'};

function calFetch(path, method, body){
  var opts = {method: method||'GET', headers: CAL_HDR};
  if(body){ opts.body = JSON.stringify(body); }
  return fetch(CAL_BASE+path, opts).then(function(r){
    if(!r.ok){ return r.json().then(function(e){throw new Error(e.error||r.status);}); }
    return r.json();
  });
}

function fetchCalBookings(){
  /* Fetch upcoming + past 90 days from Cal.com */
  return calFetch('/bookings?take=250').then(function(res){
    if(res.status !== 'success'){ throw new Error(res.error||'Cal.com API error'); }
    return Array.isArray(res.data) ? res.data : [];
  });
}

function mapCalToBooking(cb){
  var att = (cb.attendees && cb.attendees[0]) || {};
  var statusMap = {accepted:'Confirmed', cancelled:'Cancelled', pending:'Awaiting Deposit', rejected:'Cancelled'};
  return {
    calUid: cb.uid,
    calId: String(cb.id),
    custId: '',
    vehicle: '--',
    service: cb.title || 'Detail Appointment',
    addOns: '',
    date: cb.start,
    dur: cb.duration || 60,
    emp: (cb.hosts && cb.hosts[0]) ? cb.hosts[0].name : '--',
    status: statusMap[cb.status] || 'Scheduled',
    notes: cb.description || '',
    price: 0, tax: 0, dep: 0, total: 0,
    pay: 'Unpaid', method: '',
    calAttendee: att.name || '',
    calEmail: att.email || '',
    calPhone: att.phoneNumber || '',
    source: 'cal.com'
  };
}

function syncCalToFirebase(onProgress){
  if(onProgress){ onProgress('Connecting to Cal.com...'); }
  return fetchCalBookings().then(function(calBookings){
    if(onProgress){ onProgress('Found '+calBookings.length+' Cal.com bookings. Syncing...'); }
    var existing = DB.get('bookings');
    var calUidMap = {};
    existing.forEach(function(b){ if(b.calUid){ calUidMap[b.calUid] = b.id; } });

    var toAdd = [];
    var toUpdate = [];

    calBookings.forEach(function(cb){
      if(calUidMap[cb.uid]){
        var bk = DB.find('bookings', calUidMap[cb.uid]);
        var statusMap = {accepted:'Confirmed',cancelled:'Cancelled',pending:'Awaiting Deposit',rejected:'Cancelled'};
        var newStatus = statusMap[cb.status] || 'Scheduled';
        if(bk && bk.status !== newStatus && bk.source === 'cal.com'){
          toUpdate.push({id: calUidMap[cb.uid], patch:{status:newStatus, updatedAt:new Date().toISOString()}});
        }
      } else {
        toAdd.push(mapCalToBooking(cb));
      }
    });

    var ps = toAdd.map(function(b){ return DB.add('bookings',b); })
              .concat(toUpdate.map(function(u){ return DB.update('bookings',u.id,u.patch); }));

    return Promise.all(ps).then(function(){
      return DB.load('bookings');
    }).then(function(){
      return {added:toAdd.length, updated:toUpdate.length, total:calBookings.length};
    });
  });
}

}

/* DASHBOARD */
function Dashboard(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var bookings=DB.get('bookings');
  var expenses=DB.get('expenses');
  var customers=DB.get('customers');
  var today=new Date();
  var todayBks=bookings.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,today);});
  var todayRev=todayBks.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var monthBks=bookings.filter(function(b){var d=parseDate(b.date);return d&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();});
  var monthRev=monthBks.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var monthExp=expenses.filter(function(ex){var d=ex.date?new Date(ex.date):null;return d&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();}).reduce(function(s,ex){return s+(parseFloat(ex.amount)||0);},0);
  var outstanding=bookings.filter(function(b){return b.pay!=='Paid';}).reduce(function(s,b){return s+(parseFloat(b.total)||0)-(parseFloat(b.dep)||0);},0);
  var completedBks=bookings.filter(function(b){return b.status==='Completed';});
  var netProfit=monthRev-monthExp;
  var trendMap={};
  bookings.forEach(function(b){
    var d=parseDate(b.date);
    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(!trendMap[key]){trendMap[key]={m:d.toLocaleDateString('en-US',{month:'short'}),rev:0,profit:0,key:d.getTime()};}
    trendMap[key].rev+=parseFloat(b.total)||0;
  });
  expenses.forEach(function(ex){
    var d=ex.date?new Date(ex.date):null;
    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(trendMap[key]){trendMap[key].profit-=(parseFloat(ex.amount)||0);}
  });
  var trend=Object.values(trendMap).sort(function(a,b){return a.key-b.key;}).slice(-6);
  trend.forEach(function(m){m.profit=m.rev+m.profit;});
  var expByCat={};
  expenses.forEach(function(ex){var c=ex.cat||'Other';expByCat[c]=(expByCat[c]||0)+(parseFloat(ex.amount)||0);});
  var expData=Object.keys(expByCat).map(function(k){return {name:k,value:expByCat[k]};});
  var insightLines=[];
  if(completedBks.length>0){insightLines.push('You have completed '+completedBks.length+' job'+(completedBks.length!==1?'s':'')+' generating '+$$(monthRev)+' in revenue this month.');}
  if(netProfit>0){insightLines.push('Net profit this month is '+$$(netProfit)+' after '+$$(monthExp)+' in expenses.');}
  if(outstanding>0){insightLines.push(bookings.filter(function(b){return b.pay!=='Paid';}).length+' unpaid invoice(s) totaling '+$$(outstanding)+' outstanding.');}
  if(insightLines.length===0){insightLines.push('Add your first booking to start receiving AI-powered insights about your business.');}
  return e('div',{style:{display:'flex',flexDirection:'column',gap:16}},
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14}},
      e('div',{style:{background:'linear-gradient(135deg,#0A0A0A 0%,#1A1A1A 100%)',borderRadius:14,padding:'18px 20px',color:'#fff',minHeight:120}},
        e('div',{style:{fontSize:11,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'0.5px'}},"Today's Revenue"),
        e('div',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:26,fontWeight:600,marginTop:8}},$$( todayRev)),
        e('div',{style:{fontSize:12,color:'#555',marginTop:4}},todayBks.length+' job'+(todayBks.length!==1?'s':'')+' today')
      ),
      e(KpiCard,{t:t,label:'Monthly Revenue',value:$$(monthRev),icon:'dollar',sub:monthBks.length+' bookings'}),
      e(KpiCard,{t:t,label:'Net Profit (MTD)',value:$$(netProfit),icon:'up',trend:netProfit>=0?'up':'down'}),
      e(KpiCard,{t:t,label:'Outstanding',value:$$(outstanding),icon:'receipt',trend:'down',sub:bookings.filter(function(b){return b.pay!=='Paid';}).length+' unpaid'}),
      e(KpiCard,{t:t,label:'Jobs Today',value:todayBks.length,icon:'calendar',sub:todayBks.filter(function(b){return b.status==='Completed';}).length+' completed'}),
      e(KpiCard,{t:t,label:'Total Expenses',value:$$(monthExp),icon:'wallet',sub:'this month'}),
      e(KpiCard,{t:t,label:'Customers',value:customers.length,icon:'users'}),
      e(KpiCard,{t:t,label:'Completed Jobs',value:completedBks.length,icon:'check'})
    ),
    trend.length>0
      ? e('div',{style:{display:'grid',gridTemplateColumns:mobile?'1fr':'1.6fr 1fr',gap:14}},
          e(Card,{t:t},
            e('div',{style:{padding:'14px 18px 0',fontWeight:600,fontSize:14,color:t.txt}},'Revenue & Profit Trend'),
            e('div',{style:{height:240,padding:'8px 12px 14px'}},e(LineChart,{data:trend,t:t}))
          ),
          e(Card,{t:t},
            e('div',{style:{padding:'14px 18px 0',fontWeight:600,fontSize:14,color:t.txt}},'Expense Breakdown'),
            e('div',{style:{height:240,padding:'8px 12px 14px'}},
              expData.length?e(DoughnutChart,{data:expData,t:t}):e(Empty,{t:t,title:'No expenses',sub:'Add expenses to see breakdown'})
            )

/* BOOKINGS PAGE */
function Bookings(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var onNewBooking=props.onNewBooking;
  var bkS=useState(DB.get('bookings'));
  var bk=bkS[0];
  var setBk=bkS[1];
  var filterS=useState('All');
  var filter=filterS[0];
  var setFilter=filterS[1];
  var selS=useState(null);
  var sel=selS[0];
  var setSel=selS[1];
  var invModalS=useState(false);
  var invModal=invModalS[0];
  var setInvModal=invModalS[1];
  var editBkS=useState({});
  var editBk=editBkS[0];
  var setEditBk=editBkS[1];
  var toastS=useState(null);
  var toast=toastS[0];
  var setToast=toastS[1];
  var savingS=useState(false);
  var saving=savingS[0];
  var setSaving=savingS[1];

  useEffect(function(){DB.load('bookings').then(function(){setBk(DB.get('bookings'));});},[ refresh]);
  useEffect(function(){if(sel){setEditBk(Object.assign({},sel));}},[ sel?sel.id:null]);

/* CALENDAR PAGE */
function CalendarView(props){
  var t=props.t;
  var mobile=props.mobile;
  var refresh=props.refresh;
  var curS=useState(new Date());
  var cur=curS[0];
  var setCur=curS[1];
  var selDayS=useState(new Date());
  var selDay=selDayS[0];
  var setSelDay=selDayS[1];
  var syncStatusS=useState('idle');
  var syncStatus=syncStatusS[0];
  var setSyncStatus=syncStatusS[1];
  var syncMsgS=useState('');
  var syncMsg=syncMsgS[0];
  var setSyncMsg=syncMsgS[1];
  var booksS=useState(DB.get('bookings'));
  var books=booksS[0];
  var setBooks=booksS[1];

  useEffect(function(){
    DB.load('bookings').then(function(){setBooks(DB.get('bookings'));});
  },[refresh]);

  function doSync(){
    setSyncStatus('loading');
    setSyncMsg('Connecting to Cal.com...');
    syncCalToFirebase(function(msg){setSyncMsg(msg);})
      .then(function(result){
        setSyncStatus('ok');
        setSyncMsg('Done: +'+result.added+' new, '+result.updated+' updated');
        DB.load('bookings').then(function(){setBooks(DB.get('bookings'));});
        setTimeout(function(){setSyncStatus('idle');setSyncMsg('');},5000);
      })
      .catch(function(err){
        setSyncStatus('err');
        setSyncMsg('Error: '+err.message);
        setTimeout(function(){setSyncStatus('idle');setSyncMsg('');},6000);
      });
  }

  var yr=cur.getFullYear();
  var mo=cur.getMonth();
  var firstDay=new Date(yr,mo,1).getDay();
  var dim=new Date(yr,mo+1,0).getDate();
  var cells=[];
  var i;
  for(i=0;i<firstDay;i++){cells.push(null);}
  for(i=1;i<=dim;i++){cells.push(i);}

  function bksOn(day){
    if(!day){return [];}
    return books.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,new Date(yr,mo,day));});
  }

  var selBks=books.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,selDay);})
    .sort(function(a,b){return (parseDate(a.date)||0)-(parseDate(b.date)||0);});

  var dotColor={acc:t.acc,gold:t.gold,ok:t.ok,err:t.err,gray:t.txtM};

  return e('div',{style:{display:'flex',flexDirection:'column',gap:14}},

    /* Cal.com sync bar */
    e('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:t.surf,border:'1px solid '+t.border,borderRadius:12,flexWrap:'wrap'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}},
        e('div',{style:{width:8,height:8,borderRadius:'50%',flexShrink:0,background:syncStatus==='loading'?'#F59E0B':syncStatus==='ok'?t.ok:syncStatus==='err'?t.err:'#555'}}),
        e('span',{style:{fontSize:13,fontWeight:600,color:t.txt,flexShrink:0}},'Cal.com'),
        e('span',{style:{fontSize:12,color:syncStatus==='err'?t.err:syncStatus==='ok'?t.ok:t.txtM,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
          syncMsg||'Sync your Cal.com appointments into the dashboard'
        )
      ),
      e(Btn,{t:t,variant:'secondary',onClick:doSync,disabled:syncStatus==='loading',style:{flexShrink:0,fontSize:12}},
        syncStatus==='loading'?'Syncing...':'Sync Cal.com Now'
      )
    ),

    /* Calendar + day panel */
    e('div',{style:{display:'grid',gridTemplateColumns:mobile?'1fr':'1fr 300px',gap:14}},

      e(Card,{t:t,style:{padding:18}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
          e('span',{style:{fontWeight:600,fontSize:16,color:t.txt}},cur.toLocaleDateString(undefined,{month:'long',year:'numeric'})),
          e('div',{style:{display:'flex',gap:6}},
            e('button',{onClick:function(){setCur(new Date(yr,mo-1,1));},style:{width:28,height:28,borderRadius:7,border:'1px solid '+t.border,background:t.surf2,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}},e(Ic,{n:'chevL',size:14,color:t.txt2})),
            e('button',{onClick:function(){setCur(new Date());setSelDay(new Date());},style:{padding:'4px 10px',borderRadius:7,border:'1px solid '+t.border,background:t.surf2,cursor:'pointer',fontSize:12,color:t.txt,fontFamily:'Inter,sans-serif'}},'Today'),
            e('button',{onClick:function(){setCur(new Date(yr,mo+1,1));},style:{width:28,height:28,borderRadius:7,border:'1px solid '+t.border,background:t.surf2,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}},e(Ic,{n:'chevR',size:14,color:t.txt2}))
          )
        ),
        e('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}},
          ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(function(d){
            return e('div',{key:d,style:{fontSize:11,fontWeight:700,color:t.txtM,textAlign:'center',padding:'3px 0'}},d);
          }),
          cells.map(function(day,idx){
            var jobs=bksOn(day);
            var isSel=day&&sameDay(new Date(yr,mo,day),selDay);
            var isToday=day&&sameDay(new Date(yr,mo,day),new Date());
            return e('div',{
              key:idx,
              onClick:function(){if(day){setSelDay(new Date(yr,mo,day));}},
              style:{minHeight:mobile?50:68,borderRadius:9,padding:5,cursor:day?'pointer':'default',border:'1px solid '+(isSel?t.acc:t.border),background:isSel?t.accS:t.surf2}
            },
              day?e('div',null,
                e('div',{style:{fontSize:12,fontWeight:isToday?700:500,color:isToday?t.acc:t.txt2}},day),
                e('div',{style:{display:'flex',flexWrap:'wrap',gap:2,marginTop:2}},
                  jobs.slice(0,4).map(function(j,ji){
                    var c=sc(t,SC[j.status]||'gray');
                    return e('div',{key:ji,style:{width:6,height:6,borderRadius:'50%',background:c.fg}});
                  })
                )
              ):null
            );
          })
        )
      ),

      e(Card,{t:t,style:{padding:18}},
        e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:2}},
          selDay.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})
        ),
        e('div',{style:{fontSize:12,color:t.txt2,marginBottom:12}},selBks.length+' job'+(selBks.length!==1?'s':'')+' scheduled'),
        selBks.length===0
          ? e('div',{style:{fontSize:13,color:t.txtM}},'No jobs scheduled.')
          : selBks.map(function(b){
              var c=DB.find('customers',b.custId);
              var d=parseDate(b.date);
              var isCalCom=b.source==='cal.com';
              return e('div',{key:b.id,style:{padding:'10px 12px',borderRadius:9,border:'1px solid '+(isCalCom?t.gold:t.border),marginBottom:8}},
                e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
                  e('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:t.txt2}},d?d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}):'--'),
                    isCalCom?e('span',{style:{fontSize:10,fontWeight:700,color:t.gold,background:t.goldS,padding:'2px 6px',borderRadius:4,marginLeft:4}},'CAL.COM'):null
                  ),
                  e(Badge,{t:t,k:SC[b.status]||'gray'},b.status)
                ),
                e('div',{style:{fontWeight:600,fontSize:13.5,color:t.txt}},c?c.name:b.calAttendee||'--'),
                e('div',{style:{fontSize:12,color:t.txt2}},b.service),
                isCalCom&&b.calUid?e('button',{
                  onClick:function(){
                    if(!confirm('Cancel this Cal.com appointment?')){return;}
                    cancelOnCal(b.calUid,'Cancelled from dashboard').then(function(){
                      return DB.update('bookings',b.id,{status:'Cancelled',updatedAt:new Date().toISOString()});
                    }).then(function(){
                      return DB.load('bookings');
                    }).then(function(){
                      setBooks(DB.get('bookings'));
                    }).catch(function(err){alert('Cancel failed: '+err.message);});
                  },
                  style:{marginTop:6,width:'100%',padding:'5px 0',borderRadius:7,border:'none',background:t.errS,color:t.err,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}
                },'Cancel on Cal.com'):null
              );
            })
      )
    )
  );
}

/* ANALYTICS PAGE */
function Analytics(props){
  var t=props.t;
  var mobile=props.mobile;
  var bookings=DB.get('bookings');
  var expenses=DB.get('expenses');
  var customers=DB.get('customers');
  var completed=bookings.filter(function(b){return b.status==='Completed';});
  var totalRev=completed.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0);
  var totalExp=expenses.reduce(function(s,ex){return s+(parseFloat(ex.amount)||0);},0);
  var svcMap={};
  completed.forEach(function(b){svcMap[b.service]=(svcMap[b.service]||0)+(parseFloat(b.total)||0);});
  var topSvcs=Object.keys(svcMap).map(function(k){return {name:k,value:svcMap[k]};}).sort(function(a,b){return b.value-a.value;}).slice(0,5);
  var custMap={};
  completed.forEach(function(b){custMap[b.custId]=(custMap[b.custId]||0)+(parseFloat(b.total)||0);});
  var topCusts=Object.keys(custMap).map(function(id){
    var c=DB.find('customers',id);
    return {name:c?c.name:'Unknown',value:custMap[id]};
  }).sort(function(a,b){return b.value-a.value;}).slice(0,5);
  var trendMap={};
  bookings.forEach(function(b){
    var d=parseDate(b.date);
    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(!trendMap[key]){trendMap[key]={m:d.toLocaleDateString('en-US',{month:'short'}),rev:0,profit:0,key:d.getTime()};}
    trendMap[key].rev+=parseFloat(b.total)||0;
  });
  expenses.forEach(function(ex){
    var d=ex.date?new Date(ex.date):null;
    if(!d){return;}
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    if(trendMap[key]){trendMap[key].profit-=(parseFloat(ex.amount)||0);}
  });
  var trend=Object.values(trendMap).sort(function(a,b){return a.key-b.key;}).slice(-6);
  trend.forEach(function(m){m.profit=m.rev+m.profit;});
  return e('div',{style:{display:'flex',flexDirection:'column',gap:14}},
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:14}},
      e(KpiCard,{t:t,label:'Total Revenue',value:$$(totalRev),icon:'dollar'}),
      e(KpiCard,{t:t,label:'Total Expenses',value:$$(totalExp),icon:'wallet'}),
      e(KpiCard,{t:t,label:'Net Profit',value:$$(totalRev-totalExp),icon:totalRev>=totalExp?'up':'down',trend:totalRev>=totalExp?'up':'down'}),
      e(KpiCard,{t:t,label:'Jobs Completed',value:completed.length,icon:'check'}),
      e(KpiCard,{t:t,label:'Avg Ticket',value:completed.length?$$(totalRev/completed.length):'$0',icon:'star'}),
      e(KpiCard,{t:t,label:'Total Customers',value:customers.length,icon:'users'})
    ),
    trend.length>0
      ? e('div',{style:{display:'grid',gridTemplateColumns:mobile?'1fr':'1fr 1fr',gap:14}},
          e(Card,{t:t},
            e('div',{style:{padding:'14px 18px 0',fontWeight:600,fontSize:14,color:t.txt}},'Revenue vs Profit'),
            e('div',{style:{height:240,padding:'8px 12px 14px'}},e(LineChart,{data:trend,t:t}))
          ),
          topSvcs.length>0
            ? e(Card,{t:t,style:{padding:18}},
                e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:12}},'Top Services by Revenue'),
                topSvcs.map(function(s){
                  return e('div',{key:s.name,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid '+t.border,fontSize:13}},
                    e('span',{style:{color:t.txt}},s.name),
                    e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:t.txt}},$$(s.value))
                  );
                })
              )
            : null
        )
      : e(Empty,{t:t,title:'No data yet',sub:'Add bookings and expenses to see analytics'}),
    topCusts.length>0
      ? e(Card,{t:t,style:{padding:18}},
          e('div',{style:{fontWeight:600,fontSize:14,color:t.txt,marginBottom:12}},'Top Customers by Revenue'),
          topCusts.map(function(c){
            return e('div',{key:c.name,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid '+t.border,fontSize:13}},
              e('span',{style:{color:t.txt}},c.name),
              e('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:t.txt}},$$(c.value))
            );
          })
        )
      : null
  );
}

/* NOTIFICATIONS PAGE */
function Notifications(props){
  var t=props.t;
  var bookings=DB.get('bookings');
  var today=new Date();
  var notifs=[];
  var unpaid=bookings.filter(function(b){return b.pay!=='Paid'&&b.status!=='Cancelled'&&b.status!=='No Show';});
  if(unpaid.length>0){
    notifs.push({type:'err',icon:'receipt',text:unpaid.length+' unpaid booking'+(unpaid.length!==1?'s':'')+' totaling '+$$(unpaid.reduce(function(s,b){return s+(parseFloat(b.total)||0);},0))+' outstanding.'});
  }
  var todayBks=bookings.filter(function(b){var d=parseDate(b.date);return d&&sameDay(d,today);});
  if(todayBks.length>0){notifs.push({type:'acc',icon:'calendar',text:todayBks.length+' job'+(todayBks.length!==1?'s':'')+' scheduled for today.'});}
  var upcoming=bookings.filter(function(b){var d=parseDate(b.date);return d&&d>today&&(d-today)<3*24*60*60*1000;});
  if(upcoming.length>0){notifs.push({type:'gold',icon:'clock',text:upcoming.length+' job'+(upcoming.length!==1?'s':'')+' coming up in the next 3 days.'});}
  if(notifs.length===0){notifs.push({type:'gray',icon:'check',text:'All clear! No urgent notifications.'});}
  return e('div',{style:{display:'flex',flexDirection:'column',gap:10,maxWidth:600}},
    notifs.map(function(n,i){
      var c=sc(t,n.type);
      return e(Card,{t:t,key:i,style:{padding:'14px 18px',display:'flex',alignItems:'center',gap:14}},
        e('div',{style:{width:36,height:36,borderRadius:9,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
          e(Ic,{n:n.icon,size:16,color:c.fg})

        e('div',{style:{fontSize:13.5,color:t.txt}},n.text)
      );
    })
  );
}

/* MOBILE HOOK */
function useIsMobile(){
  var s=useState(window.innerWidth<=768);
  var mobile=s[0];
  var setMobile=s[1];
  useEffect(function(){
    function fn(){setMobile(window.innerWidth<=768);}
    window.addEventListener('resize',fn);
    return function(){window.removeEventListener('resize',fn);};
  },[]);
  return mobile;
}

/* APP SHELL */
function App(){
  var ds=useState(false);var dark=ds[0];var setDark=ds[1];
  var vs=useState('dashboard');var view=vs[0];var setView=vs[1];
  var ms=useState(false);var menuOpen=ms[0];var setMenuOpen=ms[1];
  var rs=useState(0);var refresh=rs[0];var setRefresh=rs[1];
  var bms=useState(false);var bookingModal=bms[0];var setBookingModal=bms[1];
  var loadingS=useState(true);var loading=loadingS[0];var setLoading=loadingS[1];
  var loadErrS=useState('');var loadErr=loadErrS[0];var setLoadErr=loadErrS[1];
  var t=dark?T.dark:T.light;
  var mobile=useIsMobile();
  var View=VIEWS[view];
  function navTo(id){setView(id);setMenuOpen(false);}
  function reload(){
    var cols=['bookings','customers','employees','expenses','invoices','services'];
    Promise.all(cols.map(function(c){return DB.load(c);})).then(function(){
      setRefresh(function(r){return r+1;});
    }).catch(function(e){console.warn('reload error:',e);});
  }

  /* Load all core data from Firestore on mount.
     Cal.com sync is intentionally NOT part of this chain -- it runs
     separately afterward so a Cal.com failure can never block the
     database connection, the login screen, or the dashboard. */
  useEffect(function(){
    var cols=['bookings','customers','employees','expenses','invoices','services'];
    Promise.all(cols.map(function(c){return DB.load(c);}))
      .then(function(){
        return DB.seedServices();
      })
      .then(function(){
        return DB.load('services');
      })
      .then(function(){
        setLoading(false);
      })
      .catch(function(e){
        setLoadErr('Could not connect to database: '+e.message);
        setLoading(false);
      });
  },[]);

  /* Cal.com sync -- fully isolated from database load. Runs once the
     dashboard is already up. If Cal.com is unreachable, misconfigured,
     or the key is invalid, this only logs a warning and never touches
     loadErr or the loading screen. */
  useEffect(function(){
    if(loading){return;}
    var timer=setTimeout(function(){
      try{
        syncCalToFirebase(function(){}).then(function(){
          setRefresh(function(r){return r+1;});
        }).catch(function(e){
          console.warn('Cal.com sync skipped:',e.message);
        });
      }catch(e){
        console.warn('Cal.com sync unavailable:',e.message);
      }
    },1500);
    return function(){clearTimeout(timer);};
  },[loading]);
