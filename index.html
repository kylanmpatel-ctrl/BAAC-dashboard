const money = (n) => n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
const moneyExact = (n) => n.toLocaleString("en-US", { style: "currency", currency: "USD" });
const isSameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

function statusColors(theme, colorKey) {
  const map = {
    accent: { bg: theme.accentSoft, fg: theme.accent },
    gold: { bg: theme.goldSoft, fg: theme.gold },
    success: { bg: theme.successSoft, fg: theme.success },
    danger: { bg: theme.dangerSoft, fg: theme.danger },
    gray: { bg: theme.surface2, fg: theme.textSecondary },
  };
  return map[colorKey] || map.gray;
}

function Badge({ theme, children, colorKey = "gray" }) {
  const c = statusColors(theme, colorKey);
  return (
    <span style={{
      background: c.bg, color: c.fg, fontFamily: "Inter, sans-serif",
      fontSize: 12, fontWeight: 600, padding: "4px 10px", borderRadius: 999,
      whiteSpace: "nowrap", display: "inline-block",
    }}>{children}</span>
  );
}

/* ---------------------------------- KPI GAUGE (signature element) ---------------------------------- */

function RevenueGauge({ theme, value, target }) {
  const pct = Math.min(1, value / target);
  const r = 54, c = 2 * Math.PI * r;
  return (
    <div style={{
      background: `linear-gradient(135deg, ${theme.sidebarBg} 0%, #1B2030 100%)`,
      borderRadius: 16, padding: "22px 24px", color: "#fff", position: "relative",
      overflow: "hidden", minHeight: 168, display: "flex", flexDirection: "column", justifyContent: "space-between",
    }}>
      <div>
        <div style={{ fontFamily: "Inter, sans-serif", fontSize: 12, fontWeight: 600, color: "#9BA3B8", textTransform: "uppercase", letterSpacing: 0.6 }}>
          Today's revenue
        </div>
        <div style={{ fontFamily: "IBM Plex Mono, monospace", fontSize: 32, fontWeight: 600, marginTop: 6, color: "#fff" }}>
          {moneyExact(value)}
        </div>
        <div style={{ fontFamily: "Inter, sans-serif", fontSize: 12, color: "#7B8296", marginTop: 4 }}>
          of {money(target)} daily target
        </div>
      </div>
      <svg width="72" height="72" viewBox="0 0 128 128" style={{ position: "absolute", right: 18, top: 18 }}>
        <circle cx="64" cy="64" r={r} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="10" />
        <circle
          cx="64" cy="64" r={r} fill="none" stroke="#C9932E" strokeWidth="10" strokeLinecap="round"
          strokeDasharray={`${c * pct} ${c}`} transform="rotate(-90 64 64)"
        />
        <text x="64" y="70" textAnchor="middle" fontFamily="IBM Plex Mono, monospace" fontSize="22" fontWeight="600" fill="#fff">
          {Math.round(pct * 100)}%
        </text>
      </svg>
    </div>
  );
}

function KpiCard({ theme, label, value, sub, icon: Icon, trend }) {
  return (
    <div style={{
      background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16,
      padding: "18px 20px", boxShadow: theme.shadow, minHeight: 168,
      display: "flex", flexDirection: "column", justifyContent: "space-between",
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontFamily: "Inter, sans-serif", fontSize: 12, fontWeight: 600, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>
          {label}
        </div>
        {Icon && <Icon size={16} color={theme.textMuted} />}
      </div>
      <div>
        <div style={{ fontFamily: "IBM Plex Mono, monospace", fontSize: 26, fontWeight: 600, color: theme.textPrimary }}>
          {value}
        </div>
        {sub && (
          <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 6, fontFamily: "Inter, sans-serif", fontSize: 12, color: trend === "down" ? theme.danger : trend === "up" ? theme.success : theme.textMuted }}>
            {trend === "up" && <TrendingUp size={13} />}
            {trend === "down" && <TrendingDown size={13} />}
            {sub}
          </div>
        )}
      </div>
    </div>
  );
}

function ChartCard({ theme, title, children, height = 260 }) {
  return (
    <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: "18px 20px", boxShadow: theme.shadow }}>
      <div style={{ fontFamily: "Space Grotesk, sans-serif", fontSize: 15, fontWeight: 600, color: theme.textPrimary, marginBottom: 14 }}>
        {title}
      </div>
      <div style={{ height }}>{children}</div>
    </div>
  );
}

function CalendarView({ theme }) {
  const [cursor, setCursor] = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(new Date());

  const year = cursor.getFullYear(), month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [...Array(startOffset).fill(null), ...Array(daysInMonth).fill(0).map((_, i) => i + 1)];

  const bookingsOn = (day) => day ? BOOKINGS.filter(b => isSameDay(b.date, new Date(year, month, day))) : [];
  const selectedBookings = BOOKINGS.filter(b => isSameDay(b.date, selectedDay)).sort((a, b) => a.date - b.date);

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 16 }}>
      <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 20, boxShadow: theme.shadow }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontFamily: "Space Grotesk, sans-serif", fontSize: 17, fontWeight: 600, color: theme.textPrimary }}>
            {cursor.toLocaleDateString(undefined, { month: "long", year: "numeric" })}
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => setCursor(new Date(year, month - 1, 1))} style={navBtn(theme)}><ChevronLeft size={16} color={theme.textSecondary} /></button>
            <button onClick={() => setCursor(new Date(year, month + 1, 1))} style={navBtn(theme)}><ChevronRight size={16} color={theme.textSecondary} /></button>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, fontFamily: "Inter, sans-serif" }}>
          {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((d) => (
            <div key={d} style={{ fontSize: 11, fontWeight: 600, color: theme.textMuted, textAlign: "center", padding: "4px 0" }}>{d}</div>
          ))}
          {cells.map((day, i) => {
            const jobs = bookingsOn(day);
            const isSelected = day && isSameDay(new Date(year, month, day), selectedDay);
            const isToday = day && isSameDay(new Date(year, month, day), new Date());
            return (
              <div key={i} onClick={() => day && setSelectedDay(new Date(year, month, day))} style={{
                minHeight: 74, borderRadius: 10, padding: 6, cursor: day ? "pointer" : "default",
                border: `1px solid ${isSelected ? theme.accent : theme.border}`,
                background: isSelected ? theme.accentSoft : theme.surface2,
              }}>
                {day && (
                  <>
                    <div style={{ fontSize: 12, fontWeight: isToday ? 700 : 500, color: isToday ? theme.accent : theme.textSecondary }}>{day}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginTop: 4 }}>
                      {jobs.slice(0, 4).map((j) => (
                        <div key={j.id} style={{ width: 6, height: 6, borderRadius: "50%", background: statusColors(theme, STATUS_META[j.status].color).fg }} />
                      ))}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 20, boxShadow: theme.shadow }}>
        <div style={{ fontFamily: "Space Grotesk, sans-serif", fontSize: 15, fontWeight: 600, color: theme.textPrimary, marginBottom: 4 }}>
          {selectedDay.toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" })}
        </div>
        <div style={{ fontFamily: "Inter, sans-serif", fontSize: 12.5, color: theme.textSecondary, marginBottom: 14 }}>{selectedBookings.length} jobs</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {selectedBookings.length === 0 && <div style={{ fontFamily: "Inter, sans-serif", fontSize: 13, color: theme.textMuted }}>No jobs scheduled.</div>}
          {selectedBookings.map((b) => {
            const cust = CUSTOMERS.find(c => c.id === b.customerId);
            const meta = STATUS_META[b.status];
            return (
              <div key={b.id} style={{ padding: "10px 12px", borderRadius: 10, border: `1px solid ${theme.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontFamily: "IBM Plex Mono, monospace", fontSize: 12.5, color: theme.textSecondary }}>
                    {b.date.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })}
                  </span>
                  <Badge theme={theme} colorKey={meta.color}>{b.status}</Badge>
                </div>
                <div style={{ fontFamily: "Inter, sans-serif", fontSize: 13.5, fontWeight: 600, color: theme.textPrimary, marginTop: 4 }}>{cust?.name}</div>
                <div style={{ fontFamily: "Inter, sans-serif", fontSize: 12.5, color: theme.textSecondary }}>{b.service} · {b.employee}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const totalOutstanding = invoices.filter(b => b.paymentStatus !== "Paid").reduce((s, b) => s + (b.total - b.deposit), 0);
  const totalPaid = invoices.filter(b => b.paymentStatus === "Paid").reduce((s, b) => s + b.total, 0);
  const overdue = invoices.filter(b => b.paymentStatus !== "Paid" && b.date < new Date()).length;

      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 28px", borderBottom: `1px solid ${theme.border}` }}>
          <div style={{ fontFamily: "Space Grotesk, sans-serif", fontSize: 20, fontWeight: 600, color: theme.textPrimary }}>{titles[view]}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, background: theme.surface2, border: `1px solid ${theme.border}`, borderRadius: 10, padding: "8px 12px", width: 220 }}>
              <Search size={14} color={theme.textMuted} />
              <input placeholder="Search everything..." style={{ border: "none", outline: "none", background: "transparent", fontFamily: "Inter, sans-serif", fontSize: 13, color: theme.textPrimary, width: "100%" }} />
            </div>
            <button onClick={() => setDark(!dark)} style={{ width: 36, height: 36, borderRadius: 10, border: `1px solid ${theme.border}`, background: theme.surface2, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {dark ? <Sun size={16} color={theme.textSecondary} /> : <Moon size={16} color={theme.textSecondary} />}
            </button>
            <button style={{ display: "flex", alignItems: "center", gap: 6, background: theme.accent, color: "#fff", border: "none", borderRadius: 10, padding: "9px 16px", fontFamily: "Inter, sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              <Plus size={15} /> New booking
            </button>
          </div>
        </div>

        <div style={{ padding: 28, overflowY: "auto" }}>
          {view === "dashboard" && <Dashboard theme={theme} />}
          {view === "bookings" && <Bookings theme={theme} />}
          {view === "customers" && <Customers theme={theme} />}
          {view === "calendar" && <CalendarView theme={theme} />}
          {view === "invoices" && <InvoicesView theme={theme} />}
          {view === "expenses" && <ExpensesView theme={theme} />}
          {view === "inventory" && <InventoryView theme={theme} />}
          {view === "employees" && <EmployeesView theme={theme} />}
          {view === "analytics" && <AnalyticsView theme={theme} />}
          {view === "notifications" && <NotificationsView theme={theme} />}
          {view === "settings" && <SettingsView theme={theme} />}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
