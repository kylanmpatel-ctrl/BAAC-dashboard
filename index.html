<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invoice Maker - Bay Area Auto Care</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,sans-serif;background:#0A0A0A;color:#fff;min-height:100vh;padding:24px 16px;}
.app{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media(max-width:768px){.app{grid-template-columns:1fr;}}
.panel{background:#111;border:1px solid #222;border-radius:14px;padding:22px;margin-bottom:14px;}
.panel h2{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;font-size:13.5px;color:#fff;outline:none;font-family:Inter,sans-serif;}
.field textarea{resize:vertical;min-height:60px;}
.field input::placeholder,.field textarea::placeholder{color:#444;}
.field select option{background:#1A1A1A;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.line-header{display:grid;grid-template-columns:1fr 70px 90px 32px;gap:8px;margin-bottom:5px;padding:0 2px;}
.line-header span{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.4px;}
.line-row{display:grid;grid-template-columns:1fr 70px 90px 32px;gap:8px;align-items:center;margin-bottom:7px;}
.line-row input{padding:8px 10px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:7px;font-size:13px;color:#fff;outline:none;font-family:Inter,sans-serif;width:100%;}
.del{width:30px;height:32px;background:#2A0A0A;border:none;border-radius:7px;color:#F87171;font-size:15px;cursor:pointer;}
.add-btn{background:none;border:1px dashed #2A2A2A;border-radius:8px;color:#555;padding:8px 0;font-size:13px;cursor:pointer;width:100%;margin-top:2px;font-family:Inter,sans-serif;}
.add-btn:hover{border-color:#444;color:#888;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:Inter,sans-serif;}
.btn-w{background:#fff;color:#000;}
.btn-g{background:#14532D;color:#4ADE80;}
.btn-s{background:#1A1A1A;color:#aaa;border:1px solid #2A2A2A;}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.copied{display:none;margin-top:10px;padding:10px 14px;background:#14532D;color:#4ADE80;border-radius:8px;font-size:13px;}
.preview-wrap{position:sticky;top:24px;}
.preview-label{font-size:11px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.preview-card{background:#fff;color:#000;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
@media print{body,html{background:#fff;padding:0;}div.app{display:block;}.panel,.actions,.preview-label,.copied{display:none!important;}.preview-wrap{position:static;}.preview-card{box-shadow:none;border-radius:0;}}
.inv-accent{height:4px;background:linear-gradient(90deg,#1a3a8f,#3b82f6);}
.inv-hdr{background:#000;color:#fff;padding:28px 32px;display:flex;justify-content:space-between;align-items:center;}
.inv-logo{width:72px;height:72px;object-fit:contain;}
.inv-co .co-name{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.inv-co .co-tag{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:2px;margin:2px 0 6px;}
.inv-co .co-info{font-size:11px;color:#888;line-height:1.7;text-align:right;}
.inv-meta{padding:20px 32px;display:flex;justify-content:space-between;border-bottom:1px solid #eee;gap:20px;}
.bill-to .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#aaa;margin-bottom:3px;}
.bill-to .cn{font-size:16px;font-weight:700;color:#000;}
.bill-to .cd{font-size:12px;color:#555;line-height:1.7;}
.inv-info{text-align:right;}
.inv-num-disp{font-size:22px;font-weight:800;color:#000;font-family:monospace;margin-bottom:6px;}
.inv-info table{font-size:12px;color:#666;border-collapse:collapse;}
.inv-info td{padding:2px 0 2px 16px;}
.inv-info td:first-child{text-align:left;color:#aaa;}
.inv-info td:last-child{font-weight:600;color:#000;font-family:monospace;}
.inv-tbl{width:100%;border-collapse:collapse;}
.inv-tbl th{background:#F8F8F8;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#aaa;padding:9px 32px;text-align:left;border-bottom:1px solid #eee;}
.inv-tbl th:last-child,.inv-tbl td:last-child{text-align:right;}
.inv-tbl td{padding:13px 32px;font-size:13px;color:#333;border-bottom:1px solid #F5F5F5;}
.inv-tbl tbody tr:last-child td{border-bottom:none;}
.inv-tots{padding:16px 32px;border-top:1px solid #eee;}
.inv-tots table{width:250px;margin-left:auto;font-size:13px;border-collapse:collapse;}
.inv-tots td{padding:4px 0;}
.inv-tots td:first-child{color:#888;}
.inv-tots td:last-child{font-family:monospace;font-weight:600;text-align:right;color:#000;}
.inv-grand td{font-size:15px;font-weight:800;padding-top:9px;border-top:2px solid #000;}
.inv-ftr{background:#F8F8F8;padding:16px 32px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;}
.inv-notes{font-size:12px;color:#555;flex:1;line-height:1.6;}
.inv-notes .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#aaa;margin-bottom:3px;}
.inv-status-area{text-align:right;}
.inv-status-area .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#aaa;margin-bottom:4px;}
.sbadge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;}
.s-unpaid{background:#FEF3C7;color:#92400E;}
.s-paid{background:#D1FAE5;color:#065F46;}
.s-partial{background:#FEE2E2;color:#991B1B;}
.inv-bottom{background:#000;color:#555;font-size:10px;text-align:center;padding:9px 32px;letter-spacing:1px;}
</style>
</head>
<body>
<div style="max-width:1100px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
  <div><div style="font-size:20px;font-weight:700;">Invoice Maker</div><div style="color:#555;font-size:13px;margin-top:2px;">Bay Area Auto Care &mdash; Professional Invoices</div></div>
  <div style="font-size:12px;color:#444;">Fill in the form &rarr; preview updates live &rarr; Print or copy email</div>
</div>
<div class="app">
<div>
<div class="panel">
  <h2>Invoice Details</h2>
  <div class="row2"><div class="field"><label>Invoice #</label><input id="f_num" value="INV-1001"/></div><div class="field"><label>Date</label><input id="f_date" type="date"/></div></div>
  <div class="row2"><div class="field"><label>Due Date</label><input id="f_due" type="date"/></div><div class="field"><label>Status</label><select id="f_status"><option>Unpaid</option><option>Paid</option><option>Partial</option></select></div></div>
</div>
<div class="panel">
  <h2>Bill To</h2>
  <div class="field"><label>Customer Name *</label><input id="f_name" placeholder="John Smith"/></div>
  <div class="row2"><div class="field"><label>Phone</label><input id="f_phone" placeholder="(415) 555-0100" type="tel"/></div><div class="field"><label>Email</label><input id="f_email" placeholder="john@email.com" type="email"/></div></div>
  <div class="field"><label>Address</label><input id="f_addr" placeholder="123 Main St, San Francisco, CA"/></div>
  <div class="field"><label>Vehicle</label><input id="f_veh" placeholder="2022 Toyota Camry - White"/></div>
</div>
<div class="panel">
  <h2>Services</h2>
  <div class="line-header"><span>Description</span><span>Qty</span><span>Price</span><span></span></div>
  <div id="lines"></div>
  <button class="add-btn" id="addLineBtn">+ Add Line Item</button>
</div>
<div class="panel">
  <h2>Totals &amp; Payment</h2>
  <div class="row3"><div class="field"><label>Discount ($)</label><input id="f_disc" type="number" value="0" step="0.01"/></div><div class="field"><label>Tax Rate (%)</label><input id="f_tax" type="number" value="8.5" step="0.1"/></div><div class="field"><label>Tip ($)</label><input id="f_tip" type="number" value="0" step="0.01"/></div></div>
  <div class="field"><label>Payment Method</label><select id="f_pay"><option value="">Select...</option><option>Card</option><option>Cash</option><option>Zelle</option><option>Venmo</option><option>CashApp</option><option>Check</option><option>Bank Transfer</option></select></div>
</div>
<div class="panel">
  <h2>Notes &amp; Terms</h2>
  <div class="field"><label>Notes</label><textarea id="f_notes" rows="3" placeholder="Thank you for choosing Bay Area Auto Care!"></textarea></div>
  <div class="field"><label>Payment Terms</label><textarea id="f_terms" rows="2"></textarea></div>
</div>
<div class="actions"><button class="btn btn-w" id="printBtn">&#x1F5A8; Print / Save PDF</button><button class="btn btn-g" id="emailBtn">&#x2709; Copy Email</button><button class="btn btn-s" id="clearBtn">Clear</button></div>
<div class="copied" id="copied">Copied! Paste into Gmail, Messages, or any email app.</div>
</div>
<div class="preview-wrap"><div class="preview-label">Live Preview</div><div class="preview-card" id="preview"></div></div>
</div>

var items=[{d:'Full Detail',q:1,p:199}];

function g(id){return document.getElementById(id);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fm(n){return '$'+(parseFloat(n)||0).toFixed(2);}

function buildLines(){
  var c=g('lines');c.innerHTML='';
  items.forEach(function(item,i){
    var row=document.createElement('div');row.className='line-row';
    var di=document.createElement('input');di.type='text';di.placeholder='Service description';di.value=item.d||'';
    di.addEventListener('input',function(){items[i].d=this.value;draw();});
    var qi=document.createElement('input');qi.type='number';qi.value=item.q;qi.min='1';
    qi.addEventListener('input',function(){items[i].q=parseFloat(this.value)||1;draw();});
    var pi=document.createElement('input');pi.type='number';pi.value=item.p;pi.step='0.01';
    pi.addEventListener('input',function(){items[i].p=parseFloat(this.value)||0;draw();});
    var db=document.createElement('button');db.className='del';db.innerHTML='&times;';
    db.addEventListener('click',function(){items.splice(i,1);buildLines();draw();});
    row.appendChild(di);row.appendChild(qi);row.appendChild(pi);row.appendChild(db);
    c.appendChild(row);
  });
}

function totals(){
  var sub=items.reduce(function(s,it){return s+(it.q*it.p);},0);
  var disc=parseFloat(g('f_disc').value)||0;
  var taxR=parseFloat(g('f_tax').value)||0;
  var tip=parseFloat(g('f_tip').value)||0;
  var taxable=Math.max(0,sub-disc);
  var tax=Math.round(taxable*taxR/100*100)/100;
  return{sub:sub,disc:disc,taxR:taxR,tax:tax,tip:tip,total:taxable+tax};
}

function draw(){
  var num=g('f_num').value||'INV-1001';
  var date=g('f_date').value;
  var due=g('f_due').value;
  var status=g('f_status').value;
  var name=g('f_name').value||'Customer Name';
  var phone=g('f_phone').value;
  var email=g('f_email').value;
  var addr=g('f_addr').value;
  var veh=g('f_veh').value;
  var notes=g('f_notes').value;
  var terms=g('f_terms').value||'Payment due by the date above. We accept Zelle, Venmo, CashApp, card, and cash.';
  var pay=g('f_pay').value;
  var v=totals();
  var fmtDate=function(s){if(!s){return '—';}var d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});};
  var sc=status==='Paid'?'s-paid':status==='Partial'?'s-partial':'s-unpaid';
  var rows=items.map(function(it){
    return '<tr><td>'+esc(it.d||'—')+'</td><td>'+it.q+'</td><td>'+fm(it.p)+'</td><td>'+fm(it.q*it.p)+'</td></tr>';
  }).join('');
  var h='<div class="inv-accent"></div>';
  h+='<div class="inv-hdr"><img class="inv-logo" src="'+LOGO+'"/><div class="inv-co"><div class="co-name">BAY AREA AUTO CARE</div><div class="co-tag">Clean. Protect. Elevate.</div><div class="co-info">415-717-9895<br>bayareaautocare.info@gmail.com<br>San Francisco Bay Area, CA</div></div></div>';
  h+='<div class="inv-meta"><div class="bill-to"><div class="lbl">Bill To</div><div class="cn">'+esc(name)+'</div><div class="cd">';
  if(veh){h+=esc(veh)+'<br>';}
  if(phone){h+=esc(phone)+'<br>';}
  if(email){h+=esc(email)+'<br>';}
  if(addr){h+='<span style="font-size:11px;color:#888;">'+esc(addr)+'</span>';}
  h+='</div></div><div class="inv-info"><div class="inv-num-disp">'+esc(num)+'</div><table>';
  h+='<tr><td>Issued</td><td>'+fmtDate(date)+'</td></tr>';
  h+='<tr><td>Due</td><td>'+fmtDate(due)+'</td></tr>';
  if(pay){h+='<tr><td>Payment</td><td>'+esc(pay)+'</td></tr>';}
  h+='<tr><td>Status</td><td><span class="sbadge '+sc+'">'+status+'</span></td></tr>';
  h+='</table></div></div>';
  h+='<table class="inv-tbl"><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>'+rows+'</tbody></table>';
  h+='<div class="inv-tots"><table>';
  h+='<tr><td>Subtotal</td><td>'+fm(v.sub)+'</td></tr>';
  if(v.disc>0){h+='<tr><td>Discount</td><td>-'+fm(v.disc)+'</td></tr>';}
  h+='<tr><td>Tax ('+v.taxR+'%)</td><td>'+fm(v.tax)+'</td></tr>';
  h+='<tr class="inv-grand"><td>TOTAL</td><td>'+fm(v.total)+'</td></tr>';
  if(v.tip>0){h+='<tr><td style="font-size:11px;color:#aaa;padding-top:6px;">Tip (gratuity)</td><td style="font-size:11px;color:#aaa;">'+fm(v.tip)+'</td></tr>';}
  h+='</table></div>';
  h+='<div class="inv-ftr"><div class="inv-notes">';
  if(notes){h+='<div class="lbl">Notes</div><div>'+esc(notes).replace(/\n/g,'<br>')+'</div><br>';}
  h+='<div class="lbl">Terms</div><div>'+esc(terms).replace(/\n/g,'<br>')+'</div>';
  h+='</div><div class="inv-status-area"><div class="lbl">Status</div><div class="sbadge '+sc+'" style="margin-top:4px;">'+status.toUpperCase()+'</div>';
  if(pay){h+='<div style="font-size:11px;color:#888;margin-top:5px;">via '+esc(pay)+'</div>';}
  h+='</div></div>';
  h+='<div class="inv-bottom">CLEAN. PROTECT. ELEVATE. &nbsp;&bull;&nbsp; BAYAREAAUTOCARE.CO</div>';
  g('preview').innerHTML=h;
}

g('addLineBtn').addEventListener('click',function(){items.push({d:'',q:1,p:0});buildLines();draw();});
g('printBtn').addEventListener('click',function(){window.print();});
g('clearBtn').addEventListener('click',function(){
  if(!confirm('Clear all?')){return;}
  ['f_name','f_phone','f_email','f_addr','f_veh','f_notes'].forEach(function(id){g(id).value='';});
  g('f_disc').value='0';g('f_tip').value='0';g('f_tax').value='8.5';
  g('f_status').value='Unpaid';g('f_pay').value='';
  items=[{d:'',q:1,p:0}];buildLines();draw();
});
g('emailBtn').addEventListener('click',function(){
  var v=totals();
  var name=g('f_name').value||'Customer';
  var num=g('f_num').value||'INV-1001';
  var due=g('f_due').value;
  var fmtD=function(s){if(!s){return 'upon receipt';}var d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});};
  var veh=g('f_veh').value;
  var pay=g('f_pay').value;
  var lineList=items.filter(function(it){return it.d;}).map(function(it){return '  \u2022 '+it.d+' x'+it.q+' \u2014 $'+(it.q*it.p).toFixed(2);}).join('\n');
  var txt='Hi '+name.split(' ')[0]+',\n\nThank you for choosing Bay Area Auto Care! Here are your invoice details.\n\n';
  txt+='Invoice: '+num+'\n';
  if(veh){txt+='Vehicle: '+veh+'\n';}
  txt+='\nSERVICES:\n'+lineList+'\n\n';
  txt+='Subtotal: $'+v.sub.toFixed(2)+'\n';
  if(v.disc>0){txt+='Discount: -$'+v.disc.toFixed(2)+'\n';}
  txt+='Tax ('+v.taxR+'%): $'+v.tax.toFixed(2)+'\n';
  txt+='TOTAL: $'+v.total.toFixed(2)+'\n';
  if(v.tip>0){txt+='Tip: $'+v.tip.toFixed(2)+' (gratuity)\n';}
  txt+='\nPayment due: '+fmtD(due)+'\n';
  if(pay){txt+='Payment method: '+pay+'\n';}
  txt+='\nTo pay:\n  Zelle: [YOUR ZELLE]\n  Venmo: @[YOUR VENMO]\n  CashApp: $[YOUR CASHAPP]\n\n';
  txt+='Thank you for your business!\n\nDarsh Patel\nBay Area Auto Care\n415-717-9895\nbayareaautocare.co\n\nClean. Protect. Elevate.';
  navigator.clipboard.writeText(txt).then(function(){
    var c=g('copied');c.style.display='block';setTimeout(function(){c.style.display='none';},4000);
  }).catch(function(){alert(txt);});
});
['f_num','f_date','f_due','f_status','f_name','f_phone','f_email','f_addr','f_veh','f_notes','f_terms','f_disc','f_tax','f_tip','f_pay'].forEach(function(id){
  g(id).addEventListener('input',draw);g(id).addEventListener('change',draw);
});
(function init(){
  var t=new Date(),d=new Date();d.setDate(d.getDate()+14);
  var pad=function(n){return n<10?'0'+n:n;};
  g('f_date').value=t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate());
  g('f_due').value=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  g('f_num').value='INV-'+(1000+Math.floor(Math.random()*900));
  g('f_notes').value='Thank you for choosing Bay Area Auto Care! It was a pleasure serving you.';
  g('f_terms').value='Payment due by the date above. We accept Zelle, Venmo, CashApp, card, and cash.';
  buildLines();draw();
})();

</script>
</body>
