<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invoice - Bay Area Auto Care</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,Arial,sans-serif;background:#0A0A0A;color:#fff;padding:16px;}

/* ── FORM PANEL ── */
.panel{background:#111;border:1px solid #222;border-radius:12px;padding:16px;margin-bottom:12px;}
.panel h2{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.f{margin-bottom:9px;}
.f label{display:block;font-size:10px;font-weight:600;color:#555;text-transform:uppercase;margin-bottom:3px;}
.f input,.f select,.f textarea{width:100%;padding:8px 10px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:7px;font-size:13px;color:#fff;outline:none;font-family:inherit;}
.f textarea{resize:vertical;min-height:50px;}
.f input::placeholder{color:#444;}
.f select option{background:#1A1A1A;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.lhdr{display:grid;grid-template-columns:1fr 55px 75px 28px;gap:5px;margin-bottom:4px;}
.lhdr span{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;}
.lrow{display:grid;grid-template-columns:1fr 55px 75px 28px;gap:5px;margin-bottom:5px;align-items:center;}
.lrow input{padding:7px 8px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:6px;font-size:12px;color:#fff;outline:none;font-family:inherit;width:100%;}
.delbtn{width:26px;height:28px;background:#2A0A0A;border:none;border-radius:5px;color:#F87171;font-size:13px;cursor:pointer;}
.addbtn{background:none;border:1px dashed #2A2A2A;border-radius:7px;color:#444;padding:7px 0;font-size:12px;cursor:pointer;width:100%;font-family:inherit;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;}
.bw{background:#fff;color:#000;}
.bg{background:#14532D;color:#4ADE80;}
.bb{background:#1a3a8f;color:#fff;}
.bs{background:#1A1A1A;color:#aaa;border:1px solid #2A2A2A;}
.acts{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.lbl{font-size:10px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}

/* ── DESKTOP: side-by-side ── */
@media(min-width:769px){
  .wrap{max-width:1100px;margin:0 auto;}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  .form-col{display:block!important;}
  .mob-bar{display:none!important;}
  .preview-wrap{position:sticky;top:16px;}
}

/* ── MOBILE: preview first, form hidden ── */
@media(max-width:768px){
  body{padding:12px;}
  .layout{display:block;}
  .form-col{display:none;}
  .form-col.open{display:block;}
  .mob-bar{display:flex!important;gap:8px;margin-bottom:12px;}
  .mob-bar .btn{flex:1;justify-content:center;}
  .preview-wrap{margin-bottom:16px;}
}

/* ── INVOICE DESIGN (white card) ── */
.inv-card{background:#fff;color:#000;border-radius:10px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.6);}
.inv-bar{height:4px;background:linear-gradient(90deg,#1a3a8f,#3b82f6);}
.inv-hdr{background:#000;color:#fff;padding:24px 28px;display:flex;justify-content:space-between;align-items:center;}
.inv-logo{width:64px;height:64px;object-fit:contain;}
.inv-co-name{font-size:16px;font-weight:800;}
.inv-co-tag{font-size:8px;color:#666;text-transform:uppercase;letter-spacing:2px;margin:2px 0 4px;}
.inv-co-info{font-size:10px;color:#888;line-height:1.7;text-align:right;}
.inv-meta{padding:16px 28px;display:flex;justify-content:space-between;border-bottom:1px solid #eee;gap:16px;}
.inv-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#aaa;margin-bottom:3px;}
.inv-cn{font-size:15px;font-weight:700;color:#000;}
.inv-cd{font-size:11px;color:#555;line-height:1.7;}
.inv-num{font-size:20px;font-weight:800;color:#000;font-family:monospace;margin-bottom:5px;text-align:right;}
.inv-info-tbl{font-size:11px;color:#666;border-collapse:collapse;}
.inv-info-tbl td{padding:2px 0 2px 12px;}
.inv-info-tbl td:first-child{text-align:left;color:#aaa;}
.inv-info-tbl td:last-child{font-weight:600;color:#000;font-family:monospace;}
.inv-tbl{width:100%;border-collapse:collapse;}
.inv-tbl th{background:#F8F8F8;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#aaa;padding:8px 28px;text-align:left;border-bottom:1px solid #eee;}
.inv-tbl th:last-child,.inv-tbl td:last-child{text-align:right;}
.inv-tbl td{padding:11px 28px;font-size:12px;color:#333;border-bottom:1px solid #F5F5F5;}
.inv-tbl tbody tr:last-child td{border-bottom:none;}
.inv-tots{padding:14px 28px;border-top:1px solid #eee;}
.inv-tots-tbl{width:230px;margin-left:auto;font-size:12px;border-collapse:collapse;}
.inv-tots-tbl td{padding:3px 0;}
.inv-tots-tbl td:first-child{color:#888;}
.inv-tots-tbl td:last-child{font-family:monospace;font-weight:600;text-align:right;color:#000;}
.inv-grand td{font-size:14px;font-weight:800;padding-top:8px;border-top:2px solid #000;}
.inv-ftr{background:#F8F8F8;padding:14px 28px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.inv-notes-sec{font-size:11px;color:#555;flex:1;line-height:1.6;}
.inv-st-area{text-align:right;flex-shrink:0;}
.sbadge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;}
.s-u{background:#FEF3C7;color:#92400E;}
.s-p{background:#D1FAE5;color:#065F46;}
.s-x{background:#FEE2E2;color:#991B1B;}
.inv-bottom{background:#000;color:#555;font-size:9px;text-align:center;padding:8px 28px;letter-spacing:1px;}

/* ── PRINT ── */
@media print{
  @page{margin:0;size:letter portrait;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:#fff!important;padding:0!important;}
  .mob-bar,.form-col,.acts,.lbl,.wrap>div:first-child{display:none!important;}
  .layout{display:block!important;max-width:100%!important;}
  .preview-wrap{position:static!important;}
  .inv-card{box-shadow:none!important;border-radius:0!important;}
  .inv-hdr{background:#000!important;}
  .inv-bar{background:linear-gradient(90deg,#1a3a8f,#3b82f6)!important;}
  .inv-bottom{background:#000!important;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Mobile buttons (hidden on desktop) -->
  <div class="mob-bar" style="display:none">
    <button class="btn bs" id="toggleBtn" onclick="toggleForm()">Edit Invoice</button>
    <button class="btn bb" id="shareBtn" onclick="saveImg()">Save as Image</button>
  </div>

  <div class="layout">

    <!-- FORM (hidden on mobile by default) -->
    <div class="form-col" id="formCol">

      <div class="panel">
        <h2>Invoice Details</h2>
        <div class="r2">
          <div class="f"><label>Invoice #</label><input id="f_num"/></div>
          <div class="f"><label>Date</label><input id="f_date" type="date"/></div>
        </div>
        <div class="r2">
          <div class="f"><label>Due Date</label><input id="f_due" type="date"/></div>
          <div class="f"><label>Status</label>
            <select id="f_status">
              <option>Unpaid</option><option>Paid</option><option>Partial</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>Bill To</h2>
        <div class="f"><label>Name</label><input id="f_name" placeholder="John Smith"/></div>
        <div class="r2">
          <div class="f"><label>Phone</label><input id="f_phone" type="tel" placeholder="(415) 555-0100"/></div>
          <div class="f"><label>Email</label><input id="f_email" type="email" placeholder="john@email.com"/></div>
        </div>
        <div class="f"><label>Address</label><input id="f_addr" placeholder="123 Main St, SF CA"/></div>
        <div class="f"><label>Vehicle</label><input id="f_veh" placeholder="2022 Toyota Camry - White"/></div>
      </div>

      <div class="panel">
        <h2>Services</h2>
        <div class="lhdr"><span>Description</span><span>Qty</span><span>Price</span><span></span></div>
        <div id="lines"></div>
        <button class="addbtn" onclick="addLine()">+ Add Line Item</button>
      </div>

      <div class="panel">
        <h2>Totals</h2>
        <div class="r3">
          <div class="f"><label>Discount ($)</label><input id="f_disc" type="number" value="0" step="0.01"/></div>
          <div class="f"><label>Tax (%)</label><input id="f_tax" type="number" value="8.5" step="0.1"/></div>
          <div class="f"><label>Tip ($)</label><input id="f_tip" type="number" value="0" step="0.01"/></div>
        </div>
        <div class="f"><label>Payment Method</label>
          <select id="f_pay">
            <option value="">Select...</option>
            <option>Card</option><option>Cash</option><option>Zelle</option>
            <option>Venmo</option><option>CashApp</option><option>Check</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <h2>Notes & Terms</h2>
        <div class="f"><label>Notes</label><textarea id="f_notes" rows="2"></textarea></div>
        <div class="f"><label>Terms</label><textarea id="f_terms" rows="2"></textarea></div>
      </div>

      <div class="acts">
        <button class="btn bw" onclick="window.print()">Save as PDF</button>
        <button class="btn bg" onclick="openGmail()">Send via Gmail</button>
        <button class="btn bb" onclick="saveImg()">Save as Image</button>
        <button class="btn bs" onclick="clearAll()">Clear</button>
      </div>

    </div><!-- /form-col -->

    <!-- PREVIEW -->
    <div class="preview-wrap">
      <div class="lbl">Live Preview</div>
      <div class="inv-card" id="preview"></div>
    </div>

  </div><!-- /layout -->
</div><!-- /wrap -->

var items=[{d:'Full Detail',q:1,p:199}];

function g(id){return document.getElementById(id);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fm(n){return'$'+(parseFloat(n)||0).toFixed(2);}

function addLine(){items.push({d:'',q:1,p:0});renderLines();}

function renderLines(){
  var c=g('lines');c.innerHTML='';
  items.forEach(function(item,i){
    var row=document.createElement('div');row.className='lrow';
    var d=document.createElement('input');d.type='text';d.placeholder='Service';d.value=item.d;
    d.oninput=function(){items[i].d=this.value;draw();};
    var q=document.createElement('input');q.type='number';q.value=item.q;
    q.oninput=function(){items[i].q=parseFloat(this.value)||1;draw();};
    var p=document.createElement('input');p.type='number';p.value=item.p;p.step='0.01';
    p.oninput=function(){items[i].p=parseFloat(this.value)||0;draw();};
    var del=document.createElement('button');del.className='delbtn';del.innerHTML='&times;';
    del.onclick=function(){items.splice(i,1);renderLines();draw();};
    row.appendChild(d);row.appendChild(q);row.appendChild(p);row.appendChild(del);
    c.appendChild(row);
  });
}

function totals(){
  var sub=items.reduce(function(s,it){return s+it.q*it.p;},0);
  var disc=parseFloat(g('f_disc').value)||0;
  var taxR=parseFloat(g('f_tax').value)||0;
  var tip=parseFloat(g('f_tip').value)||0;
  var taxable=Math.max(0,sub-disc);
  var tax=Math.round(taxable*taxR/100*100)/100;
  return{sub:sub,disc:disc,taxR:taxR,tax:tax,tip:tip,total:taxable+tax};
}

function fmtDate(s){
  if(!s)return'--';
  var d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function draw(){
  var num=g('f_num').value||'INV-1001';
  var status=g('f_status').value;
  var name=g('f_name').value||'Customer Name';
  var phone=g('f_phone').value;
  var email=g('f_email').value;
  var addr=g('f_addr').value;
  var veh=g('f_veh').value;
  var notes=g('f_notes').value;
  var terms=g('f_terms').value;
  var pay=g('f_pay').value;
  var v=totals();
  var sc=status==='Paid'?'s-p':status==='Partial'?'s-x':'s-u';

  var rows=items.map(function(it){
    return '<tr><td>'+esc(it.d||'--')+'</td><td style="text-align:center">'+it.q+'</td><td>'+fm(it.p)+'</td><td>'+fm(it.q*it.p)+'</td></tr>';
  }).join('');

  var h='<div class="inv-bar"></div>';
  h+='<div class="inv-hdr">';
  h+='<img class="inv-logo" src="'+LOGO+'"/>';
  h+='<div style="text-align:right">';
  h+='<div class="inv-co-name">BAY AREA AUTO CARE</div>';
  h+='<div class="inv-co-tag">Clean. Protect. Elevate.</div>';
  h+='<div class="inv-co-info">415-717-9895<br>bayareaautocare.info@gmail.com<br>San Francisco Bay Area, CA</div>';
  h+='</div></div>';

  h+='<div class="inv-meta">';
  h+='<div><div class="inv-lbl">Bill To</div>';
  h+='<div class="inv-cn">'+esc(name)+'</div>';
  h+='<div class="inv-cd">';
  if(veh)h+=esc(veh)+'<br>';
  if(phone)h+=esc(phone)+'<br>';
  if(email)h+=esc(email)+'<br>';
  if(addr)h+='<span style="font-size:10px;color:#999">'+esc(addr)+'</span>';
  h+='</div></div>';
  h+='<div><div class="inv-num">'+esc(num)+'</div>';
  h+='<table class="inv-info-tbl">';
  h+='<tr><td>Issued</td><td>'+fmtDate(g('f_date').value)+'</td></tr>';
  h+='<tr><td>Due</td><td>'+fmtDate(g('f_due').value)+'</td></tr>';
  if(pay)h+='<tr><td>Payment</td><td>'+esc(pay)+'</td></tr>';
  h+='<tr><td>Status</td><td><span class="sbadge '+sc+'">'+status+'</span></td></tr>';
  h+='</table></div></div>';

  h+='<table class="inv-tbl"><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Amount</th></tr></thead>';
  h+='<tbody>'+rows+'</tbody></table>';

  h+='<div class="inv-tots"><table class="inv-tots-tbl">';
  h+='<tr><td>Subtotal</td><td>'+fm(v.sub)+'</td></tr>';
  if(v.disc>0)h+='<tr><td>Discount</td><td>-'+fm(v.disc)+'</td></tr>';
  h+='<tr><td>Tax ('+v.taxR+'%)</td><td>'+fm(v.tax)+'</td></tr>';
  h+='<tr class="inv-grand"><td>TOTAL</td><td>'+fm(v.total)+'</td></tr>';
  if(v.tip>0)h+='<tr><td style="font-size:10px;color:#aaa;padding-top:5px">Tip</td><td style="font-size:10px;color:#aaa">'+fm(v.tip)+'</td></tr>';
  h+='</table></div>';

  h+='<div class="inv-ftr">';
  h+='<div class="inv-notes-sec">';
  if(notes)h+='<div class="inv-lbl">Notes</div><div>'+esc(notes)+'</div><br>';
  h+='<div class="inv-lbl">Terms</div><div>'+(esc(terms)||'Payment due by the date above. We accept Zelle, Venmo, CashApp, card, and cash.')+'</div>';
  h+='</div>';
  h+='<div class="inv-st-area"><div class="inv-lbl">Status</div>';
  h+='<div class="sbadge '+sc+'" style="margin-top:4px">'+status.toUpperCase()+'</div>';
  if(pay)h+='<div style="font-size:10px;color:#888;margin-top:4px">via '+esc(pay)+'</div>';
  h+='</div></div>';
  h+='<div class="inv-bottom">CLEAN. PROTECT. ELEVATE. &bull; BAYAREAAUTOCARE.CO</div>';

  g('preview').innerHTML=h;
}

function toggleForm(){
  var col=g('formCol');
  var btn=g('toggleBtn');
  var open=col.classList.contains('open');
  col.classList.toggle('open');
  btn.textContent=open?'Edit Invoice':'Close Form';
}

function saveImg(){
  var btn=g('shareBtn');
  if(btn)btn.textContent='Saving...';
  html2canvas(g('preview'),{scale:3,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',logging:false})
    .then(function(canvas){
      var fname='Invoice-'+(g('f_num').value||'INV')+'.png';
      canvas.toBlob(function(blob){
        if(navigator.share){
          var file=new File([blob],fname,{type:'image/png'});
          navigator.share({files:[file],title:'Bay Area Auto Care Invoice'})
            .catch(function(){dl(blob,fname);});
        } else {
          dl(blob,fname);
        }
        if(btn)btn.textContent='Save as Image';
      },'image/png');
    })
    .catch(function(e){if(btn)btn.textContent='Save as Image';alert('Error: '+e.message);});
}

function dl(blob,fname){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

function openGmail(){
  var v=totals();
  var name=(g('f_name').value||'Customer').split(' ')[0];
  var email=g('f_email').value;
  var num=g('f_num').value||'INV-1001';
  var pay=g('f_pay').value;
  var lineList=items.filter(function(it){return it.d;}).map(function(it){return (it.q>1?it.q+'x ':'')+it.d+' - $'+(it.q*it.p).toFixed(2);}).join('%0A');
  var b='Hi '+name+',%0A%0AThank you for choosing Bay Area Auto Care! Here is your invoice.%0A%0AInvoice: '+num+'%0A';
  if(g('f_veh').value)b+='Vehicle: '+g('f_veh').value+'%0A';
  b+='%0ASERVICES:%0A'+lineList+'%0A%0ASubtotal: $'+v.sub.toFixed(2)+'%0A';
  if(v.disc>0)b+='Discount: -$'+v.disc.toFixed(2)+'%0A';
  b+='Tax ('+v.taxR+'%25): $'+v.tax.toFixed(2)+'%0ATOTAL: $'+v.total.toFixed(2)+'%0A';
  if(pay)b+='Payment: '+pay+'%0A';
  b+='%0AZelle: bayareaautocare.info@gmail.com%0A%0AThank you!%0ADarsh Patel%0ABay Area Auto Care%0A415-717-9895';
  var url='https://mail.google.com/mail/?view=cm&fs=1'+(email?'&to='+encodeURIComponent(email):'')+
    '&su='+encodeURIComponent('Bay Area Auto Care - Invoice '+num)+'&body='+b;
  window.open(url,'_blank');
}

function clearAll(){
  if(!confirm('Clear all?'))return;
  ['f_name','f_phone','f_email','f_addr','f_veh','f_notes','f_terms'].forEach(function(id){g(id).value='';});
  g('f_disc').value='0';g('f_tip').value='0';g('f_tax').value='8.5';
  g('f_status').value='Unpaid';g('f_pay').value='';
  items=[{d:'',q:1,p:0}];renderLines();draw();
}

/* Wire all inputs */
['f_num','f_date','f_due','f_status','f_name','f_phone','f_email',
 'f_addr','f_veh','f_notes','f_terms','f_disc','f_tax','f_tip','f_pay']
  .forEach(function(id){var el=g(id);if(el){el.addEventListener('input',draw);el.addEventListener('change',draw);}});

/* Init */
window.addEventListener('load',function(){
  var t=new Date(),due=new Date();due.setDate(due.getDate()+14);
  var p=function(n){return n<10?'0'+n:n;};
  g('f_date').value=t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate());
  g('f_due').value=due.getFullYear()+'-'+p(due.getMonth()+1)+'-'+p(due.getDate());
  g('f_num').value='INV-'+(1000+Math.floor(Math.random()*900));
  g('f_notes').value='Thank you for choosing Bay Area Auto Care! It was a pleasure serving you.';
  g('f_terms').value='Payment due by the date above. We accept Zelle, Venmo, CashApp, card, and cash.';
  renderLines();
  draw();
});
</script>
